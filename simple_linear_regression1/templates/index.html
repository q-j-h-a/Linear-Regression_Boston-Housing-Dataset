<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>线性回归可视化教学系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root{
      --bg:#f4f7fb;--card:rgba(255,255,255,.92);--text:#0f172a;--muted:#64748b;--line:rgba(15,23,42,.08);
      --primary:#0f766e;--blue:#2563eb;--orange:#f59e0b;--red:#ef4444;--shadow:0 18px 48px rgba(15,23,42,.10);--radius:24px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top left,rgba(37,99,235,.12),transparent 32%),radial-gradient(circle at top right,rgba(245,158,11,.16),transparent 28%),linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%)}
    .app{max-width:1760px;margin:0 auto;padding:18px}
    .topbar{display:grid;grid-template-columns:1fr 620px;gap:18px;margin-bottom:18px}
    .brand{border-radius:28px;padding:22px 28px;background:linear-gradient(135deg,rgba(15,118,110,.98),rgba(37,99,235,.96));color:#fff;box-shadow:var(--shadow)}
    .brand h1{margin:0 0 8px;font-size:36px;letter-spacing:.5px}.brand p{margin:0;line-height:1.7;color:rgba(255,255,255,.9);font-size:15px}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px;border-radius:26px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(14px)}
    .metric{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}.metric span{font-size:12px;color:var(--muted);display:block;margin-bottom:8px}.metric strong{font-size:22px}
    .layout{display:grid;grid-template-columns:260px minmax(0,1fr) 360px;gap:18px;align-items:start}.layout>aside.panel:last-child{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow:auto}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(16px);overflow:hidden}.panel-head{padding:18px 20px 0;font-size:18px;font-weight:900}.panel-sub{padding:6px 20px 0;color:var(--muted);font-size:13px;line-height:1.55}.panel-body{padding:18px 20px 20px}
    .steps{display:grid;gap:12px;padding:14px}.step{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:20px;padding:14px;display:grid;grid-template-columns:38px 1fr;gap:12px;align-items:center;text-align:left;cursor:pointer;transition:.18s ease}.step:hover{transform:translateY(-1px);background:#fff}.step.active{background:linear-gradient(135deg,var(--primary),var(--blue));color:#fff;box-shadow:0 14px 28px rgba(37,99,235,.20)}.num{width:36px;height:36px;border-radius:14px;background:rgba(15,23,42,.06);display:grid;place-items:center;font-weight:900}.active .num{background:rgba(255,255,255,.20)}.step-title{display:block;font-size:15px;font-weight:900}.step-desc{display:block;margin-top:3px;font-size:12px;color:var(--muted);line-height:1.4}.active .step-desc{color:rgba(255,255,255,.83)}
    .workspace{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.workspace.single{grid-template-columns:1fr}.workspace.single .chart-card{min-height:520px}.workspace.single .chart{height:430px}.chart-card{min-height:438px}.wide{grid-column:1/-1}.chart{height:350px;padding:8px 10px 16px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}.mini-chart{height:230px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.65)}
    .control-stack{display:grid;gap:14px}.control{border:1px solid var(--line);background:rgba(255,255,255,.78);border-radius:18px;padding:14px}.control label{display:flex;justify-content:space-between;gap:12px;margin-bottom:10px;font-weight:900}.control small{color:var(--muted);font-weight:600}.tip{color:var(--muted);font-size:13px;line-height:1.75}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}select,input[type="number"]{width:100%;height:42px;border:1px solid var(--line);border-radius:14px;padding:0 12px;outline:none;background:#fff;color:var(--text);font-size:14px}input[type="range"]{width:100%;accent-color:var(--primary)}.val{font-family:Consolas,monospace;color:var(--primary)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:15px;padding:12px 13px;color:#fff;font-weight:900;cursor:pointer;transition:.18s ease}.btn:hover{transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--primary),var(--blue))}.btn.orange{background:linear-gradient(135deg,var(--orange),#ea580c)}.btn.dark{background:linear-gradient(135deg,#475569,#334155)}.btn.red{background:linear-gradient(135deg,#ef4444,#b91c1c)}
    .view-picks{display:grid;grid-template-columns:1fr;gap:9px}.view-pick{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);padding:10px 12px;font-weight:900;text-align:left;cursor:pointer;transition:.18s ease}.view-pick:hover{transform:translateY(-1px);border-color:rgba(37,99,235,.28)}.view-pick.active{background:linear-gradient(135deg,var(--primary),var(--blue));color:#fff;border-color:transparent}.view-pick small{display:block;margin-top:3px;color:var(--muted);font-weight:600}.view-pick.active small{color:rgba(255,255,255,.82)}.collapse-toggle{width:100%;height:42px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-weight:900;cursor:pointer}.collapse-toggle span{color:var(--muted);font-size:12px;font-weight:700}.collapse-body{display:grid;gap:9px;margin-top:10px}.collapse-body.closed{display:none}
    .formula{font-family:Consolas,"Microsoft YaHei",monospace;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.75;font-size:13px;white-space:pre-wrap;max-height:330px;overflow:auto}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat-grid.three{grid-template-columns:repeat(3,1fr)}.stat-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.stat-box span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.stat-box strong{font-size:18px}.placeholder{min-height:280px;border:1px dashed rgba(37,99,235,.28);border-radius:18px;background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(15,118,110,.05));display:grid;place-items:center;padding:26px;text-align:center}.placeholder strong{display:block;font-size:22px;margin-bottom:10px}.placeholder span{display:block;color:var(--muted);line-height:1.8;max-width:620px}.table-wrap{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th{position:sticky;top:0;background:#eff6ff;text-align:left;padding:10px;border-bottom:1px solid var(--line)}td{padding:9px 10px;border-bottom:1px solid rgba(15,23,42,.06);white-space:nowrap}.hidden{display:none!important}
    @media(max-width:1320px){.topbar,.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(4,1fr)}}@media(max-width:900px){.workspace,.detail-grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <section class="brand"><h1>线性回归可视化教学系统</h1><p>左侧保留 3 个大模块。数据模块负责探索与预处理；训练模块支持逐轮观察、自动播放、Loss 曲线、损失地形和指标评估。</p></section>
    <section class="metrics">
      <div class="metric"><span>当前模块</span><strong id="mModule">模型训练</strong></div><div class="metric"><span>特征</span><strong id="mFeature">RM</strong></div><div class="metric"><span>Epoch</span><strong id="mEpoch">0</strong></div><div class="metric"><span>Loss</span><strong id="mLoss">--</strong></div>
    </section>
  </header>
  <main class="layout">
    <aside class="panel"><div class="panel-head">教学模块</div><div class="panel-sub">每个模块内部再选择显示模式。</div><div class="steps" id="steps"></div></aside>
    <section class="workspace" id="workspace">
      <section class="panel chart-card" data-panel="a"><div class="panel-head" id="chartTitleA">散点图</div><div class="panel-sub" id="chartSubA">当前特征与 MEDV 的关系。</div><div id="chartA" class="chart"></div></section>
      <section class="panel chart-card" data-panel="b"><div class="panel-head" id="chartTitleB">相关性 / 损失地形</div><div class="panel-sub" id="chartSubB">根据当前模块切换展示。</div><div id="chartB" class="chart"></div></section>
      <section class="panel chart-card" data-panel="c"><div class="panel-head" id="chartTitleD">单个特征线性相关图</div><div class="panel-sub" id="chartSubD">当前特征与 MEDV 的 Pearson 相关系数。</div><div id="chartD" class="chart"></div></section>
      <section class="panel chart-card" data-panel="d"><div class="panel-head" id="chartTitleE">所有特征线性相关图</div><div class="panel-sub" id="chartSubE">13 个特征与 MEDV 的线性相关系数排行。</div><div id="chartE" class="chart"></div></section>
      <section class="panel wide" data-panel="detail"><div class="panel-head" id="detailTitle">过程详情</div><div class="panel-sub" id="detailSub">显示统计信息、Loss 曲线、本轮计算过程或参数表。</div><div class="panel-body" id="detailBody"></div></section>
    </section>
    <aside class="panel"><div class="panel-head" id="controlTitle">控制面板</div><div class="panel-sub" id="controlSub">选择特征、显示模式和训练参数。</div><div class="panel-body"><div class="control-stack" id="controls"></div></div></aside>
  </main>
</div>
<script>
const FEATURE_NAMES = {{ feature_names | tojson }};
const DEFAULT_FEATURE = {{ default_feature | tojson }};
const modules=[{key:'data',name:'数据理解与预处理',desc:'散点图 / 相关性 / 标准化'},{key:'train',name:'模型训练与评估',desc:'逐轮训练 / Loss / 等高线 / 指标'},{key:'predict',name:'预测应用与交互实验',desc:'输入预测 / 拖拽点扩展'}];
let currentModule='train';let currentFrame=0;let trainData=null;let timer=null;let dataCache=null;let chartC=null;let selectedDataViews=[];let selectedTrainViews=['regression'];let trainPickerOpen=false;let dynamicCharts={};let trainLayoutKey='';
const chartA=echarts.init(document.getElementById('chartA'));const chartB=echarts.init(document.getElementById('chartB'));const chartD=echarts.init(document.getElementById('chartD'));const chartE=echarts.init(document.getElementById('chartE'));
function $(id){return document.getElementById(id)}
function renderSteps(){ $('steps').innerHTML=modules.map((m,i)=>`<button class="step ${m.key===currentModule?'active':''}" onclick="setModule('${m.key}')"><span class="num">${i+1}</span><span><span class="step-title">${m.name}</span><span class="step-desc">${m.desc}</span></span></button>`).join('') }
function featureOptions(selected=DEFAULT_FEATURE){return FEATURE_NAMES.map(f=>`<option value="${f}" ${f===selected?'selected':''}>${f}</option>`).join('')}
function setModule(key){stopAuto();clearDynamicTrainPanels();currentModule=key;renderSteps();const m=modules.find(x=>x.key===key);$('mModule').textContent=m.name;$('controlTitle').textContent=m.name;$('controlSub').textContent=m.desc;$('controls').innerHTML=controlsHtml(key);if(key==='data'){showPanels([]);loadDataView();} if(key==='train'){showPanels([]);prepareTraining();} if(key==='predict'){showPanels(['a','b','detail']);renderPredict();}}
function syncRange(id,label,fmt=(v)=>v){const el=$(id), lab=$(label); if(el&&lab) lab.textContent=fmt(el.value)}
function showPanels(active){document.querySelectorAll('[data-panel]').forEach(el=>el.classList.toggle('hidden',!active.includes(el.dataset.panel)));const chartCount=active.filter(x=>x!=='detail').length;$('workspace').classList.toggle('single',chartCount===1);$('workspace').classList.toggle('three',chartCount===3);setTimeout(resizeCharts,0)}
function resizeCharts(){chartA.resize();chartB.resize();chartD.resize();chartE.resize();Object.values(dynamicCharts).forEach(ch=>ch.resize());if(chartC)chartC.resize()}
function dataViewButtonsHtml(){const items=[{id:'raw',name:'原始散点图',desc:'原始特征 X 与 MEDV'},{id:'standardized',name:'标准化后的散点图',desc:'标准化 X 与 MEDV'},{id:'feature_corr',name:'单个特征的线性相关图',desc:'当前特征 Pearson r'},{id:'all_corr',name:'所有特征的线性相关图',desc:'13 个特征相关排行'}];return `<div class="view-picks">${items.map(item=>`<button type="button" data-view="${item.id}" class="view-pick ${selectedDataViews.includes(item.id)?'active':''}" onclick="toggleDataView('${item.id}')">${item.name}<small>${item.desc}</small></button>`).join('')}</div>`}
function toggleDataView(id){selectedDataViews=selectedDataViews.includes(id)?selectedDataViews.filter(x=>x!==id):[...selectedDataViews,id];document.querySelectorAll('.view-pick').forEach(btn=>btn.classList.toggle('active',selectedDataViews.includes(btn.dataset.view)));if(dataCache)renderDataCharts(dataCache);else loadDataView()}
function trainViewButtonsHtml(){const items=[{id:'regression',name:'散点图 + 回归线',desc:'当前线 / 历史淡出 / 最优线'},{id:'loss',name:'Loss 曲线图',desc:'MSE 随 epoch 生成'},{id:'contour',name:'MSE 损失函数等高线图',desc:'w-b 参数地形与路径'},{id:'gd_animation',name:'梯度下降动画图',desc:'方向 / 步长 / 更新'},{id:'rmse',name:'RMSE 指标仪表盘',desc:'越小越好'},{id:'mae',name:'MAE 指标仪表盘',desc:'越小越好'},{id:'r2',name:'R² 指标仪表盘',desc:'越接近 1 越好'},{id:'calc',name:'本轮计算过程',desc:'预测 / 误差 / 梯度 / 更新'},{id:'table',name:'每轮参数表',desc:'epoch / w / b / 指标'},{id:'sandbox',name:'物理模拟式交互画板（预留）',desc:'后续实现'}];return `<button type="button" class="collapse-toggle" onclick="toggleTrainPicker()">已选 ${selectedTrainViews.length} 项<span>${trainPickerOpen?'收起':'展开'}</span></button><div id="trainPickerBody" class="collapse-body ${trainPickerOpen?'':'closed'}">${items.map(item=>`<button type="button" data-train-view="${item.id}" class="view-pick ${selectedTrainViews.includes(item.id)?'active':''}" onclick="toggleTrainView('${item.id}')">${item.name}<small>${item.desc}</small></button>`).join('')}</div>`}
function toggleTrainPicker(){trainPickerOpen=!trainPickerOpen;const body=$('trainPickerBody');if(body)body.classList.toggle('closed',!trainPickerOpen);const label=document.querySelector('.collapse-toggle span');if(label)label.textContent=trainPickerOpen?'收起':'展开'}
function toggleTrainView(id){selectedTrainViews=selectedTrainViews.includes(id)?selectedTrainViews.filter(x=>x!==id):[...selectedTrainViews,id];document.querySelectorAll('[data-train-view]').forEach(btn=>btn.classList.toggle('active',selectedTrainViews.includes(btn.dataset.trainView)));const toggle=document.querySelector('.collapse-toggle');if(toggle)toggle.firstChild.textContent=`已选 ${selectedTrainViews.length} 项`;renderTrainFrame(currentFrame)}
function controlsHtml(key){
 if(key==='data') return `<div class="control"><label>选择特征<small>13个特征</small></label><select id="dataFeature" onchange="loadDataView()">${featureOptions()}</select></div><div class="control"><label>显示模式<small>可多选</small></label>${dataViewButtonsHtml()}</div><div class="control"><label>观察重点<small>教学提示</small></label><div class="tip">点击一个图就显示一个图；点击多个图就同时显示多个图；全部取消后中间区域保持空白。</div></div>`;
 if(key==='train') return `<div class="control"><label>显示模式<small>可多选</small></label>${trainViewButtonsHtml()}</div><div class="control"><label>选择特征<small>单特征回归</small></label><select id="trainFeature" onchange="prepareTraining()">${featureOptions()}</select></div><div class="control"><label>数据版本<small>X是否标准化</small></label><select id="trainStd" onchange="prepareTraining()"><option value="1" selected>预处理后：标准化特征 → MEDV</option><option value="0">未处理：原始特征 → MEDV</option></select></div><div class="row2"><div class="control"><label>初始 w<small>数值</small></label><input id="w0" type="number" value="0" step="0.1" onchange="prepareTraining()"></div><div class="control"><label>初始 b<small>数值</small></label><input id="b0" type="number" value="0" step="0.1" onchange="prepareTraining()"></div></div><div class="control"><label>学习率<small class="val" id="lrText">0.030</small></label><input id="lr" type="range" min="0.001" max="0.2" step="0.001" value="0.03" oninput="syncRange('lr','lrText',v=>Number(v).toFixed(3))" onchange="prepareTraining()"></div><div class="control"><label>训练轮数<small class="val" id="epText">120</small></label><input id="epochs" type="range" min="1" max="500" step="1" value="120" oninput="syncRange('epochs','epText')" onchange="prepareTraining()"></div><div class="control"><label>动画速度<small class="val" id="speedText">80ms</small></label><input id="speed" type="range" min="20" max="500" step="10" value="80" oninput="syncRange('speed','speedText',v=>v+'ms')"></div><div class="btns"><button class="btn primary" onclick="showNextFrame()">训练一轮</button><button class="btn orange" onclick="startAuto()">自动训练</button><button class="btn dark" onclick="stopAuto()">暂停</button><button class="btn red" onclick="resetFrames()">重置</button></div>`;
 return `<div class="control"><label>选择特征<small>输入原始值</small></label><select id="predFeature">${featureOptions()}</select></div><div class="control"><label>数据版本<small>与训练一致</small></label><select id="predStd"><option value="1" selected>标准化特征模型</option><option value="0">原始特征模型</option></select></div><div class="control"><label>输入特征值<small>例如 RM=6.5</small></label><input id="predValue" type="number" value="6.5" step="0.1"></div><div class="btns"><button class="btn primary" onclick="predictValue()">开始预测</button><button class="btn dark" onclick="renderPredict()">清空</button></div><div class="control"><label>说明<small>教学提示</small></label><div class="tip">如果模型使用标准化特征，预测时也必须用训练集的 mean/std 对新输入做同样转换。</div></div>`;
}
function scatterOption(scatter,line,xName){const pts=scatter.x.map((x,i)=>[x,scatter.y[i]]);const lineData=line.x.map((x,i)=>[x,line.y[i]]);return{tooltip:{trigger:'item'},legend:{top:8},grid:{left:55,right:24,top:58,bottom:50},xAxis:{type:'value',name:xName,nameLocation:'middle',nameGap:30,splitLine:{show:true}},yAxis:{type:'value',name:'MEDV',nameLocation:'middle',nameGap:40,splitLine:{show:true}},series:[{name:'原始散点',type:'scatter',data:pts,symbolSize:5,itemStyle:{color:'rgba(37,99,235,.68)'}},{name:'趋势线',type:'line',data:lineData,showSymbol:false,lineStyle:{color:'#ef4444',width:2.3}}]}}
function corrOption(rows,current){return{tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},grid:{left:82,right:28,top:28,bottom:36},xAxis:{type:'value',min:-1,max:1,name:'Pearson r'},yAxis:{type:'category',data:rows.map(r=>r.feature).reverse()},series:[{type:'bar',data:rows.map(r=>({value:r.corr,itemStyle:{color:r.feature===current?'#f59e0b':(r.corr>=0?'#2563eb':'#0f766e')}})).reverse(),barWidth:14}]}}
function singleCorrOption(data){const corr=data.raw.summary.corr;return{tooltip:{trigger:'axis'},grid:{left:55,right:28,top:38,bottom:50},xAxis:{type:'category',data:[data.feature],name:'特征'},yAxis:{type:'value',min:-1,max:1,name:'Pearson r'},series:[{name:'线性相关系数',type:'bar',barWidth:54,data:[{value:corr,itemStyle:{color:corr>=0?'#2563eb':'#0f766e'}}],label:{show:true,position:corr>=0?'top':'bottom',formatter:()=>corr.toFixed(4),fontWeight:800}}],graphic:{type:'text',right:24,top:16,style:{text:`${data.description}`,fontSize:12,fill:'#64748b'}}}}
async function loadDataView(){const feature=$('dataFeature')?.value||DEFAULT_FEATURE;$('mFeature').textContent=feature;$('mEpoch').textContent='--';$('mLoss').textContent='--';const resp=await fetch('/api/data_view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature})});const data=await resp.json();if(!resp.ok){alert(data.error||'加载失败');return}dataCache=data;renderDataCharts(data)}
function renderDataCharts(data){const panelMap={raw:'a',standardized:'b',feature_corr:'c',all_corr:'d'};const active=selectedDataViews.map(id=>panelMap[id]).filter(Boolean);showPanels(active);chartA.clear();chartB.clear();chartD.clear();chartE.clear();if(!selectedDataViews.length)return;const raw=data.raw;const std=data.standardized;if(selectedDataViews.includes('raw')){$('chartTitleA').textContent='原始散点图';$('chartSubA').textContent=`横轴：${data.feature}，纵轴：MEDV`;chartA.setOption(scatterOption(raw.scatter,raw.trend_line,data.feature),true)}if(selectedDataViews.includes('standardized')){$('chartTitleB').textContent='标准化后的散点图';$('chartSubB').textContent=`横轴：${std.feature_name}，纵轴：MEDV`;chartB.setOption(scatterOption(std.scatter,std.trend_line,std.feature_name),true)}if(selectedDataViews.includes('feature_corr')){$('chartTitleD').textContent='单个特征的线性相关图';$('chartSubD').textContent=`${data.feature} 与 MEDV 的 Pearson 相关系数`;chartD.setOption(singleCorrOption(data),true)}if(selectedDataViews.includes('all_corr')){$('chartTitleE').textContent='所有特征的线性相关图';$('chartSubE').textContent='13 个特征与 MEDV 的 Pearson 相关系数排行';chartE.setOption(corrOption(data.correlations,data.feature),true)}}
function renderDataDetail(data,mode){$('detailTitle').textContent= mode==='table'?'13个特征标准化参数':'当前特征统计信息';$('detailSub').textContent='MEDV 保留原始房价，不参与标准化。';if(mode==='table'){ $('detailBody').innerHTML=`<div class="table-wrap"><table><thead><tr><th>特征</th><th>标准化列</th><th>mean</th><th>std</th><th>原始范围</th><th>标准化后范围</th></tr></thead><tbody>${data.standardize_table.map(r=>`<tr><td>${r.feature}</td><td>${r.standardized_feature}</td><td>${r.mean.toFixed(6)}</td><td>${r.std.toFixed(6)}</td><td>[${r.min_before.toFixed(3)}, ${r.max_before.toFixed(3)}]</td><td>[${r.min_after.toFixed(3)}, ${r.max_after.toFixed(3)}]</td></tr>`).join('')}</tbody></table></div>`;return}const s=data.raw.summary;const ss=data.standardized.summary;$('detailBody').innerHTML=`<div class="stat-grid"><div class="stat-box"><span>样本数</span><strong>${s.sample_count}</strong></div><div class="stat-box"><span>原始相关系数</span><strong>${s.corr.toFixed(4)}</strong></div><div class="stat-box"><span>标准化后相关系数</span><strong>${ss.corr.toFixed(4)}</strong></div><div class="stat-box"><span>MEDV均值</span><strong>${s.target_mean.toFixed(2)}</strong></div></div><br><div class="formula">当前特征：${data.feature}\n含义：${data.description}\n原始范围：[${s.feature_min.toFixed(4)}, ${s.feature_max.toFixed(4)}]\n标准化后范围：[${ss.feature_min.toFixed(4)}, ${ss.feature_max.toFixed(4)}]\n标准化公式：x_standardized = (x - mean) / std\n注意：标准化不会改变相关系数，只会改变横轴尺度。</div>`}
async function prepareTraining(){stopAuto();const feature=$('trainFeature')?.value||DEFAULT_FEATURE;const useStd=($('trainStd')?.value||'1')==='1';const lr=Number($('lr')?.value||0.03);const epochs=Number($('epochs')?.value||120);const w0=Number($('w0')?.value||0);const b0=Number($('b0')?.value||0);$('mFeature').textContent=feature;$('mEpoch').textContent='0';$('mLoss').textContent='--';const resp=await fetch('/api/train_prepare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature,use_standardized:useStd,learning_rate:lr,epochs,w0,b0})});const data=await resp.json();if(!resp.ok){alert(data.error||'训练准备失败');return}trainData=data;currentFrame=0;renderTrainFrame(0)}
function lineForParams(w,b){return trainData.line_x.map(x=>[x,w*x+b])}
function lineForFrame(frame){return lineForParams(frame.w,frame.b)}
function historyLineColor(age,maxAge){const opacity=Math.max(0.08,1-age/maxAge);return `rgba(239,68,68,${opacity*0.62})`}
function trainScatterOption(frameIndex){const frame=trainData.history[frameIndex];const pts=trainData.scatter.x.map((x,i)=>[x,trainData.scatter.y[i]]);const trail=trainData.history.slice(Math.max(0,frameIndex-18),frameIndex);const maxAge=Math.max(1,trail.length);const trailSeries=trail.map((r,i)=>({name:i===trail.length-1?'历史回归线':'',type:'line',data:lineForFrame(r),showSymbol:false,silent:true,lineStyle:{color:historyLineColor(trail.length-i,maxAge),width:1.8}}));return{tooltip:{trigger:'item'},legend:{top:8},grid:{left:55,right:24,top:58,bottom:50},xAxis:{type:'value',name:trainData.x_column,nameLocation:'middle',nameGap:30},yAxis:{type:'value',name:'MEDV',nameLocation:'middle',nameGap:40},series:[{name:'真实数据',type:'scatter',data:pts,symbolSize:5,itemStyle:{color:'rgba(37,99,235,.68)'}},...trailSeries,{name:'当前回归线',type:'line',data:lineForFrame(frame),showSymbol:false,lineStyle:{color:'#ef4444',width:3.2}},{name:'最优回归线',type:'line',data:lineForParams(trainData.best.w,trainData.best.b),showSymbol:false,lineStyle:{color:'#0f766e',type:'dashed',width:2.6}}]}}
function nearestIndex(arr,val){let idx=0,best=Infinity;arr.forEach((v,i)=>{const d=Math.abs(v-val);if(d<best){best=d;idx=i}});return idx}
function mseAt(w,b){const xs=trainData.scatter.x,ys=trainData.scatter.y;let s=0;for(let i=0;i<xs.length;i++){const e=w*xs[i]+b-ys[i];s+=e*e}return s/xs.length}
function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length}
function std(arr){const m=mean(arr);return Math.sqrt(mean(arr.map(v=>(v-m)*(v-m))))}
function contourFrame(){const ys=trainData.scatter.y;const yStd=std(ys);const wSpan=Math.max(Math.abs(trainData.best.w)*2.2,yStd*1.25,8);const bSpan=Math.max(yStd*2.1,18);const xMin=trainData.best.w-wSpan,xMax=trainData.best.w+wSpan,yMin=trainData.best.b-bSpan,yMax=trainData.best.b+bSpan;const corners=[[xMin,yMin],[xMin,yMax],[xMax,yMin],[xMax,yMax]];const minLoss=mseAt(trainData.best.w,trainData.best.b);const maxDelta=Math.max(...corners.map(p=>mseAt(p[0],p[1])-minLoss),1);return{xMin,xMax,yMin,yMax,minLoss,maxDelta}}
function contourEllipsePoints(level,steps=180){const xs=trainData.scatter.x;const mx=xs.reduce((a,b)=>a+b,0)/xs.length;const mx2=xs.reduce((a,b)=>a+b*b,0)/xs.length;const a=mx2,d=1,c=mx;const tr=a+d;const disc=Math.sqrt((a-d)*(a-d)+4*c*c);const l1=(tr+disc)/2,l2=(tr-disc)/2;const ang=Math.atan2(l1-a,c);const ca=Math.cos(ang),sa=Math.sin(ang);const r1=Math.sqrt(level/Math.max(l1,1e-9));const r2=Math.sqrt(level/Math.max(l2,1e-9));const pts=[];for(let i=0;i<=steps;i++){const t=2*Math.PI*i/steps;const u=r1*Math.cos(t),v=r2*Math.sin(t);pts.push([trainData.best.w+ca*u-sa*v,trainData.best.b+sa*u+ca*v])}return pts}
function contourOption(frameIndex){const frame=trainData.history[frameIndex];const hist=trainData.history.slice(0,frameIndex+1);const cf=contourFrame();const levels=[0.9,0.65,0.45,0.3,0.2,0.12,0.07,0.035].map(t=>cf.maxDelta*t);const fillColors=['rgba(37,99,235,.035)','rgba(37,99,235,.045)','rgba(37,99,235,.055)','rgba(15,118,110,.055)','rgba(15,118,110,.065)','rgba(245,158,11,.060)','rgba(245,158,11,.075)','rgba(239,68,68,.055)'];const fills=levels.map((lv,i)=>{const pts=contourEllipsePoints(lv);return{name:'',type:'custom',coordinateSystem:'cartesian2d',silent:true,data:[0],renderItem:(params,api)=>({type:'polygon',shape:{points:pts.map(p=>api.coord(p))},style:{fill:fillColors[i],stroke:null}})}});const lineSeries=levels.map((lv,i)=>({name:i===0?'MSE 等高线':'',type:'line',data:contourEllipsePoints(lv),showSymbol:false,silent:true,lineStyle:{color:`rgba(37,99,235,${0.28+0.055*(levels.length-i)})`,width:1.4}}));const path=hist.map(r=>[r.w,r.b]);return{tooltip:{trigger:'item',formatter:p=>{if(p.seriesName==='当前参数'||p.seriesName==='起点'||p.seriesName==='最优参数')return `w=${p.value[0].toFixed(4)}<br>b=${p.value[1].toFixed(4)}<br>MSE=${mseAt(p.value[0],p.value[1]).toFixed(4)}`;return ''}},legend:{top:8},grid:{left:58,right:26,top:58,bottom:52},xAxis:{type:'value',min:cf.xMin,max:cf.xMax,name:'w',nameLocation:'middle',nameGap:30,splitLine:{show:true}},yAxis:{type:'value',min:cf.yMin,max:cf.yMax,name:'b',nameLocation:'middle',nameGap:42,splitLine:{show:true}},series:[...fills,...lineSeries,{name:'参数轨迹',type:'line',data:path,showSymbol:true,symbolSize:5,lineStyle:{color:'#ef4444',width:3},itemStyle:{color:'#ef4444'}},{name:'起点',type:'scatter',data:[[trainData.history[0].w,trainData.history[0].b]],symbolSize:15,itemStyle:{color:'#f59e0b',borderColor:'#fff',borderWidth:2}},{name:'当前参数',type:'scatter',data:[[frame.w,frame.b]],symbolSize:18,itemStyle:{color:'#ef4444',borderColor:'#fff',borderWidth:2}},{name:'最优参数',type:'scatter',data:[[trainData.best.w,trainData.best.b]],symbolSize:18,itemStyle:{color:'#0f766e',borderColor:'#fff',borderWidth:2}}]}}
function gdArrowSeries(frame,nextFrame){const to=nextFrame?[nextFrame.w,nextFrame.b]:[frame.new_w,frame.new_b];return[{name:'本轮更新方向底色',type:'line',data:[[frame.w,frame.b],to],showSymbol:false,silent:true,lineStyle:{color:'rgba(249,115,22,.22)',width:16,cap:'round'},z:28},{name:'本轮更新方向',type:'line',data:[[frame.w,frame.b],to],showSymbol:true,symbol:['none','arrow'],symbolSize:[0,24],lineStyle:{color:'#fb923c',width:7,type:'solid',cap:'round',shadowBlur:8,shadowColor:'rgba(249,115,22,.55)'},itemStyle:{color:'#fb923c',borderColor:'#fff',borderWidth:2},z:30}]}
function gradientDescentOption(frameIndex){const base=contourOption(frameIndex);const frame=trainData.history[frameIndex];const next=trainData.history[Math.min(frameIndex+1,trainData.history.length-1)];const hist=trainData.history.slice(0,frameIndex+1).map(r=>[r.w,r.b]);base.legend={top:8};base.series=[...base.series.filter(s=>!['参数轨迹','当前参数'].includes(s.name)),{name:'已走路径',type:'line',data:hist,showSymbol:true,symbolSize:5,lineStyle:{color:'rgba(239,68,68,.62)',width:2.4},itemStyle:{color:'#ef4444'},z:12},...gdArrowSeries(frame,next),{name:'当前参数',type:'scatter',data:[[frame.w,frame.b]],symbolSize:23,itemStyle:{color:'#ef4444',borderColor:'#fff',borderWidth:3},z:32},{name:'下一步位置',type:'scatter',data:[[next.w,next.b]],symbolSize:18,itemStyle:{color:'#f97316',borderColor:'#fff',borderWidth:3},z:31},{name:'最优参数',type:'scatter',data:[[trainData.best.w,trainData.best.b]],symbolSize:18,itemStyle:{color:'#0f766e',borderColor:'#fff',borderWidth:2},z:18}];base.graphic=[{type:'group',right:18,top:54,children:[{type:'rect',shape:{x:0,y:0,width:210,height:138,r:14},style:{fill:'rgba(255,255,255,.88)',stroke:'rgba(15,23,42,.10)',lineWidth:1,shadowBlur:12,shadowColor:'rgba(15,23,42,.08)'}},{type:'text',left:14,top:12,style:{text:`epoch ${frame.epoch} → ${next.epoch}`,fontSize:14,fontWeight:900,fill:'#0f172a'}},{type:'text',left:14,top:40,style:{text:`粗橙箭头 = 本轮实际步长`,fontSize:12,fontWeight:800,fill:'#f97316'}},{type:'text',left:14,top:64,style:{text:`dw=${frame.dw.toFixed(4)}    db=${frame.db.toFixed(4)}`,fontSize:12,fill:'#0f172a'}},{type:'text',left:14,top:88,style:{text:`lr=${trainData.learning_rate}`,fontSize:12,fill:'#0f766e',fontWeight:800}},{type:'text',left:14,top:112,style:{text:`MSE ${frame.mse.toFixed(3)} → ${next.mse.toFixed(3)}`,fontSize:12,fill:'#ef4444',fontWeight:800}}]}];return base}
function lossOption(frameIndex){const rows=trainData.history.slice(0,frameIndex+1);return{tooltip:{trigger:'axis'},grid:{left:55,right:22,top:28,bottom:42},xAxis:{type:'value',name:'epoch'},yAxis:{type:'value',name:'MSE'},series:[{name:'Loss',type:'line',smooth:true,showSymbol:true,symbolSize:4,data:rows.map(r=>[r.epoch,r.loss]),lineStyle:{color:'#0f766e',width:3},areaStyle:{color:'rgba(15,118,110,.12)'}}]}}
function evalOption(frame){const pts=trainData.scatter.x.map((x,i)=>[trainData.scatter.y[i],frame.w*x+frame.b]);return{tooltip:{trigger:'item'},grid:{left:62,right:24,top:38,bottom:50},xAxis:{type:'value',name:'真实 MEDV',nameLocation:'middle',nameGap:30},yAxis:{type:'value',name:'预测 MEDV',nameLocation:'middle',nameGap:42},series:[{name:'真实-预测点',type:'scatter',data:pts,symbolSize:5,itemStyle:{color:'rgba(37,99,235,.70)'}},{name:'理想线 y=x',type:'line',data:[[0,0],[55,55]],showSymbol:false,lineStyle:{color:'#ef4444',width:2.5,type:'dashed'}}]}}
function metricMax(key,fallback){const vals=trainData.history.map(r=>Number(r[key])).filter(Number.isFinite);return Math.max(fallback,...vals)*1.08}
function gaugeOption(frame,key){const label=key==='rmse'?'RMSE':key==='mae'?'MAE':'R²';const value=key==='r2'?Math.max(-1,Math.min(1,frame.r2)):frame[key];const max=key==='rmse'?metricMax('rmse',1):key==='mae'?metricMax('mae',1):1;const min=key==='r2'?-1:0;const colors=key==='r2'?[[0.25,'#ef4444'],[0.6,'#f59e0b'],[1,'#0f766e']]:[[0.35,'#0f766e'],[0.7,'#f59e0b'],[1,'#ef4444']];return{series:[{type:'gauge',min,max,radius:'82%',startAngle:210,endAngle:-30,splitNumber:6,axisLine:{lineStyle:{width:18,color:colors}},axisTick:{show:false},splitLine:{length:14,lineStyle:{width:3,color:'#cbd5e1'}},axisLabel:{color:'#64748b',fontSize:12},pointer:{width:6,itemStyle:{color:'#0f172a'}},detail:{formatter:v=>Number(v).toFixed(4),fontSize:30,fontWeight:900,offsetCenter:[0,'42%']},title:{offsetCenter:[0,'72%'],fontSize:18,fontWeight:900,color:'#0f172a'},data:[{value,name:label}]}]}}
function trainTableHtml(frameIndex){const rows=trainData.history.slice(0,Math.min(frameIndex+1,300));return `<div class="table-wrap"><table><thead><tr><th>Epoch</th><th>w</th><th>b</th><th>MSE</th><th>RMSE</th><th>MAE</th><th>R²</th><th>dw</th><th>db</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.epoch}</td><td>${r.w.toFixed(6)}</td><td>${r.b.toFixed(6)}</td><td>${r.mse.toFixed(6)}</td><td>${r.rmse.toFixed(6)}</td><td>${r.mae.toFixed(6)}</td><td>${r.r2.toFixed(6)}</td><td>${r.dw.toFixed(6)}</td><td>${r.db.toFixed(6)}</td></tr>`).join('')}</tbody></table></div>`}
function calcText(frame){return `当前轮次 epoch: ${frame.epoch}\n当前参数: w=${frame.w.toFixed(6)}, b=${frame.b.toFixed(6)}\n学习率 lr=${trainData.learning_rate}\n\n1. 预测值前5个:\n${JSON.stringify(frame.pred_first5)}\n真实值前5个:\n${JSON.stringify(frame.y_first5)}\n\n2. 误差前5个:\n${JSON.stringify(frame.err_first5)}\n\n3. 指标:\nMSE=${frame.mse.toFixed(6)}\nRMSE=${frame.rmse.toFixed(6)}\nMAE=${frame.mae.toFixed(6)}\nR²=${frame.r2.toFixed(6)}\n\n4. 梯度:\ndw=${frame.dw.toFixed(6)}\ndb=${frame.db.toFixed(6)}\n\n5. 参数更新:\nw_new = ${frame.w.toFixed(6)} - ${trainData.learning_rate} × (${frame.dw.toFixed(6)}) = ${frame.new_w.toFixed(6)}\nb_new = ${frame.b.toFixed(6)} - ${trainData.learning_rate} × (${frame.db.toFixed(6)}) = ${frame.new_b.toFixed(6)}`}
function gdCalcText(frame){const stepW=trainData.learning_rate*frame.dw;const stepB=trainData.learning_rate*frame.db;return `梯度下降本轮拆解\n\n当前位置:\nw=${frame.w.toFixed(6)}\nb=${frame.b.toFixed(6)}\nMSE=${frame.mse.toFixed(6)}\n\n梯度方向:\ndw=${frame.dw.toFixed(6)}\ndb=${frame.db.toFixed(6)}\n负梯度方向=(-dw, -db)\n\n学习率把梯度缩放成实际步长:\nlr=${trainData.learning_rate}\nstep_w=lr × dw=${stepW.toFixed(6)}\nstep_b=lr × db=${stepB.toFixed(6)}\n\n参数更新:\nw_new = w - step_w = ${frame.new_w.toFixed(6)}\nb_new = b - step_b = ${frame.new_b.toFixed(6)}\n\n观察重点:\n学习率小，橙色箭头短，移动慢。\n学习率合适，路径稳定靠近最优点。\n学习率过大，箭头过长，可能越过最优点甚至发散。`}
function setChartTitles(a,b,as,bs){$('chartTitleA').textContent=a;$('chartTitleB').textContent=b;$('chartSubA').textContent=as;$('chartSubB').textContent=bs}
function setPanel(panel,title,sub,option){const cfg={a:[chartA,'chartTitleA','chartSubA'],b:[chartB,'chartTitleB','chartSubB'],c:[chartD,'chartTitleD','chartSubD'],d:[chartE,'chartTitleE','chartSubE']}[panel];cfg[0].clear();$(cfg[1]).textContent=title;$(cfg[2]).textContent=sub;cfg[0].setOption(option,true)}
function trainChartConfig(view,frame){if(view==='regression')return['散点图 + 回归线',`第 ${frame.epoch} 轮：旧回归线逐渐淡出，当前回归线为红色，最优回归线为绿色虚线。`,trainScatterOption(currentFrame)];if(view==='loss')return['Loss 曲线图','MSE Loss 会随着“训练一轮”逐点生成。',lossOption(currentFrame)];if(view==='contour')return['MSE 损失函数等高线图','浅色椭圆表示相同 MSE；起点、当前点、最优终点和训练路径随 epoch 展开。',contourOption(currentFrame)];if(view==='gd_animation')return['梯度下降动画图','箭头表示本轮负梯度方向；橙色箭头长度由学习率决定。',gradientDescentOption(currentFrame)];if(['rmse','mae','r2'].includes(view)){const label=view==='rmse'?'RMSE':view==='mae'?'MAE':'R²';return[`${label} 指标仪表盘`,view==='r2'?'R² 越接近 1 越好；初始模型可能出现负值。':`${label} 越小越好。`,gaugeOption(frame,view)]}if(view==='sandbox')return['物理模拟式交互画板（预留）','后续支持拖拽散点、实时更新回归线和残差垂线。',placeholderOption('交互画板预留','计划展示：可拖拽二维散点、实时最小二乘回归线、点到线的残差线段，以及按残差大小变化的颜色。')];return null}
function clearDynamicTrainPanels(){Object.values(dynamicCharts).forEach(ch=>ch.dispose());dynamicCharts={};trainLayoutKey='';document.querySelectorAll('.train-dynamic').forEach(el=>el.remove())}
function addTrainChartPanel(view,index){const panel=document.createElement('section');panel.className='panel chart-card train-dynamic';panel.dataset.view=view;panel.innerHTML=`<div class="panel-head" id="trainHead_${index}"></div><div class="panel-sub" id="trainSub_${index}"></div><div id="trainChart_${index}" class="chart"></div>`;$('workspace').appendChild(panel);dynamicCharts[`trainChart_${index}`]=echarts.init($(`trainChart_${index}`))}
function addTrainInfoPanel(view,index){const panel=document.createElement('section');panel.className='panel wide train-dynamic';panel.dataset.view=view;panel.innerHTML=`<div class="panel-head" id="trainInfoHead_${index}"></div><div class="panel-sub" id="trainInfoSub_${index}"></div><div class="panel-body" id="trainInfoBody_${index}"></div>`;$('workspace').appendChild(panel)}
function ensureTrainLayout(chartViews,infoViews){const key=[...chartViews,...infoViews].join('|');if(key===trainLayoutKey)return;showPanels([]);clearDynamicTrainPanels();trainLayoutKey=key;$('workspace').classList.toggle('single',chartViews.length===1);$('workspace').classList.toggle('three',chartViews.length===3);chartViews.forEach((view,i)=>addTrainChartPanel(view,i));infoViews.forEach((view,i)=>addTrainInfoPanel(view,i));setTimeout(resizeCharts,0)}
function updateTrainChartPanel(view,frame,index){const cfg=trainChartConfig(view,frame);if(!cfg)return;$(`trainHead_${index}`).textContent=cfg[0];$(`trainSub_${index}`).textContent=cfg[1];dynamicCharts[`trainChart_${index}`].setOption(cfg[2],true)}
function updateTrainInfoPanel(view,frame,index){if(view==='calc'){$(`trainInfoHead_${index}`).textContent='本轮计算过程';$(`trainInfoSub_${index}`).textContent='展示当前轮的预测、误差、指标、梯度与参数更新。';const text=selectedTrainViews.includes('gd_animation')?gdCalcText(frame):calcText(frame);$(`trainInfoBody_${index}`).innerHTML=`<div class="formula">${text}</div>`}else if(view==='table'){$(`trainInfoHead_${index}`).textContent='每轮参数变化表';$(`trainInfoSub_${index}`).textContent='显示到当前轮为止的 epoch、w、b、loss 和评价指标。';$(`trainInfoBody_${index}`).innerHTML=trainTableHtml(currentFrame)}}
function renderTrainFrame(i){if(!trainData)return;currentFrame=Math.max(0,Math.min(i,trainData.history.length-1));const frame=trainData.history[currentFrame];$('mEpoch').textContent=frame.epoch;$('mLoss').textContent=Number(frame.loss).toFixed(3);const chartViews=selectedTrainViews.filter(v=>!['table','calc'].includes(v));const infoViews=selectedTrainViews.filter(v=>['calc','table'].includes(v));if(!selectedTrainViews.length){ensureTrainLayout([],[]);$('workspace').classList.add('single');return}ensureTrainLayout(chartViews,infoViews);chartViews.forEach((view,i)=>updateTrainChartPanel(view,frame,i));infoViews.forEach((view,i)=>updateTrainInfoPanel(view,frame,i))}
function placeholderOption(title,body){return{graphic:[{type:'group',left:'center',top:'middle',bounding:'raw',children:[{type:'rect',shape:{x:-250,y:-88,width:500,height:176,r:18},style:{fill:'rgba(248,250,252,.92)',stroke:'rgba(37,99,235,.20)',lineWidth:1,shadowBlur:18,shadowColor:'rgba(15,23,42,.08)'}},{type:'text',left:-218,top:-50,style:{text:title,fontSize:24,fontWeight:900,fill:'#0f172a'}},{type:'text',left:-218,top:-10,style:{text:body,width:436,overflow:'break',lineHeight:24,fontSize:14,fill:'#64748b'}}]}]}}
function renderReservedDetail(title,body){$('detailTitle').textContent=title;$('detailSub').textContent='当前为功能预留位，后续可以在这里继续扩展教学交互。';$('detailBody').innerHTML=`<div class="placeholder"><div><strong>${title}</strong><span>${body}</span></div></div>`}
function renderLossAndCalc(frame){$('detailTitle').textContent='Loss 曲线与本轮计算过程';$('detailSub').textContent='点击“训练一轮”可逐步观察参数更新。';$('detailBody').innerHTML=`<div class="detail-grid"><div id="chartC" class="mini-chart"></div><div class="formula">${calcText(frame)}</div></div>`;if(chartC) chartC.dispose();chartC=echarts.init($('chartC'));chartC.setOption(lossOption(currentFrame),true)}
function renderCalcOnly(frame){$('detailTitle').textContent='本轮计算过程';$('detailSub').textContent='展示当前轮的预测、误差、指标、梯度与参数更新。';$('detailBody').innerHTML=`<div class="formula">${calcText(frame)}</div>`}
function renderSingleMetricCard(frame,key){const label=key==='rmse'?'RMSE':key==='mae'?'MAE':'R²';const desc=key==='rmse'?'RMSE = sqrt(MSE)，对大误差更敏感，越小越好。':key==='mae'?'MAE = mean(|error|)，表示平均绝对误差，越小越好。':'R² = 1 - SSE/SST，衡量模型解释方差的能力，越接近 1 越好。';$('detailTitle').textContent=`当前轮 ${label} 指标`;$('detailSub').textContent=`第 ${frame.epoch} 轮的单项评价指标。`;$('detailBody').innerHTML=`<div class="stat-grid"><div class="stat-box"><span>${label}</span><strong>${frame[key].toFixed(4)}</strong></div><div class="stat-box"><span>MSE</span><strong>${frame.mse.toFixed(4)}</strong></div><div class="stat-box"><span>Epoch</span><strong>${frame.epoch}</strong></div><div class="stat-box"><span>Loss</span><strong>${frame.loss.toFixed(4)}</strong></div></div><br><div class="formula">${desc}</div>`}
function renderMetricCards(frame){$('detailTitle').textContent='当前轮模型评估指标';$('detailSub').textContent='三块仪表盘对应 RMSE、MAE、R²。';$('detailBody').innerHTML=`<div class="stat-grid three"><div class="stat-box"><span>RMSE</span><strong>${frame.rmse.toFixed(4)}</strong></div><div class="stat-box"><span>MAE</span><strong>${frame.mae.toFixed(4)}</strong></div><div class="stat-box"><span>R²</span><strong>${frame.r2.toFixed(4)}</strong></div></div><br><div class="formula">评价说明：\nRMSE = sqrt(MSE)，对大误差更敏感，越小越好。\nMAE = mean(|error|)，表示平均绝对误差，越小越好。\nR² = 1 - SSE/SST，衡量模型解释方差的能力，越接近 1 越好。\n当前 MSE = ${frame.mse.toFixed(6)}</div>`}
function showNextFrame(){if(!trainData)return;renderTrainFrame(currentFrame+1)}
function resetFrames(){stopAuto();renderTrainFrame(0)}
function startAuto(){if(!trainData)return;stopAuto();timer=setInterval(()=>{if(currentFrame>=trainData.history.length-1){stopAuto();return}renderTrainFrame(currentFrame+1)},Number($('speed')?.value||80))}
function stopAuto(){if(timer){clearInterval(timer);timer=null}}
function predictScatterOption(data,prediction){const pts=data.raw.scatter.x.map((x,i)=>[x,data.raw.scatter.y[i]]);const lineData=data.raw.trend_line.x.map((x,i)=>[x,data.raw.trend_line.y[i]]);const series=[{name:'训练数据',type:'scatter',data:pts,symbolSize:5,itemStyle:{color:'rgba(37,99,235,.68)'}},{name:'参考回归线',type:'line',data:lineData,showSymbol:false,lineStyle:{color:'#ef4444',width:2.5}}];if(prediction){series.push({name:'当前输入',type:'scatter',data:[[prediction.raw_value,prediction.prediction]],symbolSize:16,itemStyle:{color:'#f59e0b',borderColor:'#fff',borderWidth:2},label:{show:true,formatter:'预测点',position:'top'}})}return{tooltip:{trigger:'item'},legend:{top:8},grid:{left:55,right:24,top:58,bottom:50},xAxis:{type:'value',name:data.feature,nameLocation:'middle',nameGap:30,splitLine:{show:true}},yAxis:{type:'value',name:'MEDV',nameLocation:'middle',nameGap:40,splitLine:{show:true}},series}}
function predictGuideOption(feature,prediction,data){const hasResult=!!prediction;const valueText=hasResult?`原始值：${prediction.raw_value}`:'原始值：等待输入';const modelText=hasResult?`模型输入 x：${prediction.model_x.toFixed(4)}`:'模型输入 x：--';const predText=hasResult?`预测 MEDV：${prediction.prediction.toFixed(4)} 千美元`:'预测 MEDV：--';const stdText=hasResult&&prediction.use_standardized?`标准化：(${prediction.raw_value} - ${prediction.mean.toFixed(4)}) / ${prediction.std.toFixed(4)}`:'标准化：仅在标准化模型下生效';const resultColor=hasResult?'#0f766e':'#64748b';return{graphic:[{type:'group',left:8,top:10,children:[{type:'rect',shape:{x:0,y:0,width:304,height:262,r:20},style:{fill:'#fff',stroke:'rgba(15,23,42,.08)',lineWidth:1,shadowBlur:10,shadowColor:'rgba(15,23,42,.05)'}},{type:'text',left:16,top:16,style:{text:`${feature} 预测流程`,fontSize:18,fontWeight:800,fill:'#0f172a'}},{type:'text',left:16,top:44,style:{text:'按右侧输入值，依次完成换算与预测。',fontSize:12,fill:'#64748b'}},{type:'rect',left:14,top:76,shape:{x:0,y:0,width:276,height:34,r:12},style:{fill:'rgba(37,99,235,.06)',stroke:'rgba(37,99,235,.12)',lineWidth:1}},{type:'circle',left:28,top:83,shape:{r:10},style:{fill:'#2563eb'}},{type:'text',left:52,top:76,style:{text:valueText,fontSize:13,fill:'#0f172a',height:34,lineHeight:34,verticalAlign:'middle'}},{type:'rect',left:14,top:116,shape:{x:0,y:0,width:276,height:34,r:12},style:{fill:'rgba(245,158,11,.08)',stroke:'rgba(245,158,11,.14)',lineWidth:1}},{type:'circle',left:28,top:123,shape:{r:10},style:{fill:'#f59e0b'}},{type:'text',left:52,top:116,style:{text:modelText,fontSize:13,fill:'#0f172a',height:34,lineHeight:34,verticalAlign:'middle'}},{type:'rect',left:14,top:156,shape:{x:0,y:0,width:276,height:34,r:12},style:{fill:'rgba(15,118,110,.08)',stroke:'rgba(15,118,110,.14)',lineWidth:1}},{type:'circle',left:28,top:163,shape:{r:10},style:{fill:'#0f766e'}},{type:'text',left:52,top:156,style:{text:predText,fontSize:13,fontWeight:800,fill:resultColor,height:34,lineHeight:34,verticalAlign:'middle'}},{type:'rect',left:14,top:196,shape:{x:0,y:0,width:276,height:46,r:12},style:{fill:'rgba(100,116,139,.06)',stroke:'rgba(100,116,139,.12)',lineWidth:1}},{type:'text',left:52,top:196,style:{text:stdText,fontSize:12,fill:'#475569',height:46,lineHeight:46,verticalAlign:'middle'}}]}],tooltip:{show:false}}}
async function renderPredict(){$('mModule').textContent='预测应用';$('mEpoch').textContent='--';$('mLoss').textContent='--';$('chartTitleA').textContent='预测参考分布';$('chartSubA').textContent='先看训练数据的分布，再输入新值做预测。';$('chartTitleB').textContent='预测流程说明';$('chartSubB').textContent='右侧输入原始特征值，点击开始预测后查看结果。';$('detailTitle').textContent='预测结果';$('detailSub').textContent='当前页会展示参考分布、标准化说明和最终预测值。';$('detailBody').innerHTML='<div class="formula">请先在右侧选择特征并输入数值，然后点击“开始预测”。\n进入页面后会自动显示该特征的训练分布与预测流程。</div>';try{const feature=$('predFeature')?.value||DEFAULT_FEATURE;const resp=await fetch('/api/data_view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature})});const data=await resp.json();if(!resp.ok)throw new Error(data.error||'加载预测参考失败');chartA.setOption(predictScatterOption(data,null),true);chartB.setOption(predictGuideOption(feature,null,data),true)}catch(err){chartA.clear();chartB.clear();chartA.setOption({graphic:{type:'text',left:'center',top:'middle',style:{text:'预测参考图加载失败',fontSize:20,fontWeight:800,fill:'#ef4444',align:'center'}}},true);chartB.setOption({graphic:{type:'text',left:'center',top:'middle',style:{text:String(err.message||err),fontSize:16,fill:'#64748b',align:'center'}}},true)}}
async function predictValue(){const feature=$('predFeature').value;const value=Number($('predValue').value);const use_standardized=$('predStd').value==='1';const resp=await fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature,value,use_standardized})});const data=await resp.json();if(!resp.ok){alert(data.error||'预测失败');return}$('mFeature').textContent=feature;$('detailTitle').textContent='预测结果';$('detailSub').textContent='输入值、模型换算和最终房价预测。';$('detailBody').innerHTML=`<div class="formula">输入原始 ${feature}: ${data.raw_value}\n模型使用的 x: ${data.model_x.toFixed(6)}\n预测公式: MEDV = ${data.w.toFixed(6)} × x + ${data.b.toFixed(6)}\n预测 MEDV = ${data.prediction.toFixed(4)} 千美元\n${data.use_standardized?`\n标准化参数: mean=${data.mean.toFixed(6)}, std=${data.std.toFixed(6)}`:''}</div>`;try{const ref=await fetch('/api/data_view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feature})});const refData=await ref.json();if(ref.ok){chartA.setOption(predictScatterOption(refData,data),true);chartB.setOption(predictGuideOption(feature,data,refData),true)}}catch(e){}}
window.setModule=setModule;renderSteps();setModule(currentModule);window.addEventListener('resize',resizeCharts);
</script>
