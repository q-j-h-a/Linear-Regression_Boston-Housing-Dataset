<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单线性回归教学实验</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --soft: #f6f7fb;
      --text: #172033;
      --muted: #6b7280;
      --line: #e6e8ef;
      --purple: #5b35f5;
      --purple-soft: #f1efff;
      --green: #0f9f78;
      --green-soft: #eafaf4;
      --amber: #c47a11;
      --amber-soft: #fff7e8;
      --rose: #d9354f;
      --blue: #2563eb;
      --shadow: 0 18px 46px rgba(31, 41, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(91, 53, 245, .38) transparent;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(91, 53, 245, .42), rgba(15, 159, 120, .38));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(91, 53, 245, .72), rgba(15, 159, 120, .62));
      background-clip: padding-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    button, select, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      background: #fff;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions.hidden-top {
      display: none;
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      min-height: 0;
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 320px;
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: 250px minmax(0, 1fr);
    }
    .shell.theory .assistant {
      display: none;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 22px 16px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);
      overflow: auto;
      padding: 32px;
    }
    .assistant {
      border-left: 1px solid var(--line);
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    details.nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 16px;
      margin-bottom: 18px;
    }
    details.nav-section summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 14px;
    }
    details.nav-section summary::-webkit-details-marker { display: none; }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 0;
      padding-left: 14px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 10px;
      top: 14px;
      bottom: 14px;
      width: 1px;
      background: var(--line);
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      text-align: left;
      padding: 10px 0;
      color: var(--text);
      border-radius: 12px;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 2px;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;
    }
    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 22px 1fr 22px;
      align-items: start;
      gap: 10px;
      color: var(--text);
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 0 6px;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);
      color: var(--purple);
    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
      font-weight: 400;
    }
    details.nested-section summary:hover .dot {
      border-color: var(--purple);
    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    details.nested-section .step-list {
      padding-left: 22px;
      margin-top: 0;
      gap: 0;
    }
    details.nested-section .step-list:before {
      left: 18px;
      top: 6px;
    }
    details.nested-section .nav-btn {
      padding: 7px 0;
    }
    details.nested-section .nav-btn strong {
      font-size: 14px;
    }
    details.nested-section .chev {
      margin-top: 0;
    }
    .hero-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 20px;
    }
    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--purple);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 10px 0 0;
      color: #4b5563;
      line-height: 1.75;
      max-width: 900px;
    }
    .primary-btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #3919d8);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 22px rgba(91, 53, 245, .22);
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
      min-height: 112px;
    }
    .stat-card.purple { background: #f7f5ff; }
    .stat-card.green { background: #effcf6; }
    .stat-card.amber { background: #fffaf0; }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-card strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }
    .content-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .content-card p {
      margin: 10px 0;
      line-height: 1.9;
      color: #283449;
      font-size: 16px;
    }
    .html-lesson {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      padding: 0;
    }
    .html-lesson iframe {
      width: 100%;
      min-height: 120px;
      border: 0;
      background: #fff;
      display: block;
    }
    .formula {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(520px, 100%), 1fr));
      gap: 18px;
      align-items: start;
    }
    .chart-grid.single {
      grid-template-columns: minmax(min(680px, 100%), 980px);
      justify-content: center;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 455px;
      height: clamp(455px, 54vh, 620px);
      max-height: 820px;
      resize: vertical;
    }
    .chart-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 9px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: .42;
      background:
        linear-gradient(135deg, transparent 54%, #9aa3b2 56%, #9aa3b2 62%, transparent 64%),
        linear-gradient(135deg, transparent 68%, #9aa3b2 70%, #9aa3b2 76%, transparent 78%);
    }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-card.small {
      min-height: 340px;
      height: clamp(340px, 42vh, 480px);
    }
    .chart-head {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      font-weight: 900;
      font-size: 16px;
    }
    .chart-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .chart-grid.single .chart-card {
      min-height: 540px;
      height: clamp(540px, 66vh, 740px);
    }
    .chart-card.wide {
      min-height: 500px;
      height: clamp(500px, 58vh, 680px);
    }
    .dashboard-grid {
      display: block;
      position: relative;
      min-height: 640px;
    }
    .dashboard-grid.grid-stack {
      width: 100%;
      overflow: visible;
    }
    .dashboard-grid.grid-stack > .grid-stack-item {
      position: absolute;
      min-width: 0;
    }
    .dashboard-grid .grid-stack-item-content {
      position: absolute;
      inset: 8px;
      overflow: visible;
    }
    .dashboard-grid .chart-card {
      height: 100%;
      min-height: 0;
      max-height: none;
      resize: none;
    }
    .dashboard-grid .chart-head {
      cursor: grab;
    }
    .dashboard-grid .chart-head:active {
      cursor: grabbing;
    }
    .dashboard-grid .ui-resizable-se {
      width: 22px;
      height: 22px;
      right: 8px;
      bottom: 8px;
    }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="0"] { left: 0%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="1"] { left: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="2"] { left: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="3"] { left: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="1"] { width: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="2"] { width: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="3"] { width: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="4"] { width: 100%; }
    .empty-state {
      border: 1px dashed #cfd5df;
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      color: var(--muted);
      padding: 30px;
    }
    .right-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .right-title:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .helper-card, .control-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    .helper-card h3, .control-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .helper-card p {
      color: #4b5563;
      line-height: 1.75;
      margin: 0 0 10px;
      font-size: 14px;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcff;
      text-align: center;
    }
    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat strong {
      display: block;
      font-size: 23px;
    }
    label.control-label {
      display: block;
      font-weight: 900;
      margin: 14px 0 8px;
      font-size: 13px;
    }
    select, input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      outline: none;
      padding: 0 12px;
      color: var(--text);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--purple);
    }
    .check-list {
      display: grid;
      gap: 8px;
    }
    details.mode-menu {
      position: relative;
    }
    details.mode-menu summary {
      list-style: none;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: var(--text);
    }
    details.mode-menu summary::-webkit-details-marker { display: none; }
    details.mode-menu summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
    }
    details.mode-menu[open] summary:after {
      transform: rotate(180deg);
    }
    details.mode-menu .check-list {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      box-shadow: var(--shadow);
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      color: #273244;
      background: #fff;
      user-select: none;
    }
    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
    }
    .check-row:has(input:checked) {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: #321aa2;
      font-weight: 800;
    }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .range-line {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      color: #fff;
      height: 38px;
      font-weight: 900;
    }
    .btn.primary { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.dark { background: #4b5563; }
    .btn.rose { background: var(--rose); }
    .runtime {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .runtime div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .runtime strong { color: var(--text); }
    .table-wrap {
      overflow: auto;
      max-height: 430px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      white-space: nowrap;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }
    .hidden { display: none !important; }
    @media (max-width: 1260px) {
      .shell { grid-template-columns: 240px minmax(0, 1fr); }
      .shell.theory { grid-template-columns: 240px minmax(0, 1fr); }
      .assistant { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px; }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .chart-card.wide { grid-column: auto; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">ML</div>
      <div>
        <h1>简单线性回归教学实验</h1>
        <p>机器学习基础实验 / Boston Housing 房价预测</p>
      </div>
    </div>
    <div class="top-actions hidden-top">
      <span class="pill" id="topFeature">当前特征 RM</span>
      <button class="primary-btn" type="button" id="jumpExperiment">开始实验</button>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <details class="nav-section" open>
        <summary>理论部分 <span class="chev">›</span></summary>
        <div class="step-list">
          <button class="nav-btn" data-page="basic" type="button"><span class="dot"></span><span><strong>实验基本信息</strong><span>实验背景与任务</span></span></button>

function featureOptions(selected = DEFAULT_FEATURE) {
  return FEATURE_NAMES.map(f => `<option value="${f}" ${f === selected ? "selected" : ""}>${f}</option>`).join("");
}

function setActive(page) {
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
  const modelPages = ["dataset", "model", "criterion", "optimization", "evaluation"];
  document.querySelectorAll(".nested-section").forEach(section => {
    section.classList.toggle("active", modelPages.includes(page));
  });
}

function disposeCharts() {
  chartResizeObservers.forEach(observer => observer.disconnect());
  chartResizeObservers.clear();
  charts.forEach(ch => ch.dispose());
  charts.clear();
}

function saveDataGridLayout() {
  if (!dataGrid) return;
  const layout = {};
  dataGrid.getGridItems().forEach(item => {
    const node = item.gridstackNode;
    const view = item.dataset.view;
    if (!node || !view) return;
    layout[view] = { x: node.x, y: node.y, w: node.w, h: node.h };
  });
  localStorage.setItem(dataGridMode === "train" ? "trainGridLayoutV1" : "preprocessGridLayoutV4", JSON.stringify(layout));
}

function destroyDataGrid() {
  if (!dataGrid) return;
  saveDataGridLayout();
  dataGrid.destroy(false);
  dataGrid = null;
  dataGridMode = null;
}

function initChart(id) {
  const el = $(id);
  const ch = echarts.init(el);
  charts.set(id, ch);
  const resize = () => ch.resize();
  if ("ResizeObserver" in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(el);
    if (el.parentElement) observer.observe(el.parentElement);
    chartResizeObservers.set(id, observer);
  }
  requestAnimationFrame(resize);
  return ch;
}

function renderTheory(page) {
  document.querySelector(".shell").classList.add("theory");
  const item = theoryPages[page] || theoryPages.dataset;
  $("main").innerHTML = `
    <section class="hero-card">
      <div class="hero-line">
        <div>
          <div class="eyebrow">理论部分</div>
          <h2>${item.title}</h2>
        </div>
      </div>
      ${renderTheoryHtmlSlot(page)}
    </section>
  `;
  $("rightPanel").innerHTML = "";
  loadTheoryHtml(page);
}

function setPage(page) {
  persistActiveViewSelection();
  stopAuto();
  currentPage = page;
  setActive(page);
  destroyDataGrid();
  disposeCharts();
  $("topFeature").textContent = `当前特征 ${currentFeature()}`;
  if (page === "preprocess") {
    renderDataShell();
    loadDataView();
  } else if (page === "train_eval") {
    renderTrainShell();
    prepareTraining();
  } else {
    renderTheory(page);
  }
}

function persistActiveViewSelection() {
  if (currentPage === "preprocess" && document.querySelector('input[name="dataViews"]')) {
    saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
  }
  if (currentPage === "train_eval" && document.querySelector('input[name="trainViews"]')) {
    saveCheckedValues("trainViews", "trainSelectedViewsV1");
  }
}

function currentFeature() {
  const dataFeature = $("dataFeature");
  const trainFeature = $("trainFeature");
  return dataFeature?.value || trainFeature?.value || DEFAULT_FEATURE;
}

function selectedValues(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(el => el.value);
}

function restoreCheckedValues(name, storageKey) {
  let values = null;
  try {
    values = JSON.parse(localStorage.getItem(storageKey) || "null");
  } catch (err) {}
  if (!Array.isArray(values)) return;
  const inputs = [...document.querySelectorAll(`input[name="${name}"]`)];
  const validValues = new Set(inputs.map(el => el.value));
  const allowed = new Set(values.filter(value => validValues.has(value)));
  if (values.length && !allowed.size) return;
  inputs.forEach(el => {
    el.checked = allowed.has(el.value);
  });
}

function saveCheckedValues(name, storageKey) {
  localStorage.setItem(storageKey, JSON.stringify(selectedValues(name)));
}

function renderDataShell() {
  document.querySelector(".shell").classList.remove("theory");
  $("main").innerHTML = `
    <section class="hero-card">
      <div class="hero-line">
        <div>
          <div class="eyebrow">实验部分</div>
          <h2>数据预处理</h2>
        </div>
      </div>
      <div class="chart-grid" id="chartGrid"></div>
    </section>`;
  $("rightPanel").innerHTML = `
    <div class="right-title">控制面板</div>
    <div class="control-card">
      <div class="mini-stats">
        <div class="mini-stat"><span>样本总数</span><strong id="sampleCount">--</strong></div>
        <div class="mini-stat"><span>特征数量</span><strong id="featureCount">13</strong></div>
      </div>
      <label class="control-label" for="dataFeature">特征选择</label>
      <select id="dataFeature">${featureOptions(currentFeature())}</select>
      <label class="control-label">显示模式</label>
      <details class="mode-menu">
        <summary id="dataModeSummary">已选择 1 项</summary>
        <div class="check-list">
          <label class="check-row"><input type="checkbox" name="dataViews" value="raw" checked> 原始散点图</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="standardized"> 预处理散点图</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="single_corr"> 单特征线性相关系数</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="all_corr"> 全特征线性相关系数</label>
        </div>
      </details>
    </div>`;
  $("dataFeature").addEventListener("change", loadDataView);
  restoreCheckedValues("dataViews", "preprocessSelectedViewsV1");
  document.querySelectorAll('input[name="dataViews"]').forEach(el => el.addEventListener("change", () => {
    saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
    renderDataCharts();
  }));
}

async function loadDataView() {
  const feature = $("dataFeature").value;
  $("topFeature").textContent = `当前特征 ${feature}`;
  try {
    dataCache = await postJson("/api/data_view", { feature });
    $("sampleCount").textContent = dataCache.raw.summary.sample_count;
    $("featureCount").textContent = dataCache.correlations.length;
    renderDataCharts();
  } catch (err) {
    renderError(err.message);
  }
}

function renderDataCharts() {
  if (!dataCache) return;
  destroyDataGrid();
  disposeCharts();
  const views = selectedValues("dataViews");
  saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
  const grid = $("chartGrid");
  $("dataModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择显示模式";
  grid.classList.toggle("single", views.length === 1);
  grid.classList.remove("dashboard-grid", "grid-stack");
  if (!views.length) {
    grid.innerHTML = `<div class="empty-state">请选择至少一个显示模式。</div>`;
    return;
  }
  if (window.GridStack) {
    renderDataDashboard(grid, views);
  } else {
    grid.innerHTML = views.map(view => chartCardHtml(view, chartTitle(view), chartSub(view, dataCache), dataCardSize(view))).join("");
  }
  views.forEach(view => {
    const ch = initChart(`chart_${view}`);
    if (view === "raw") ch.setOption(scatterOption(dataCache.raw.scatter, dataCache.raw.trend_line, dataCache.feature, "原始散点图"), true);
    if (view === "standardized") ch.setOption(scatterOption(dataCache.standardized.scatter, dataCache.standardized.trend_line, dataCache.standardized.feature_name, "预处理散点图"), true);
    if (view === "single_corr") ch.setOption(singleCorrOption(dataCache), true);
    if (view === "all_corr") ch.setOption(allCorrOption(dataCache.correlations, dataCache.feature), true);
  });
}

function renderDataDashboard(grid, views) {
  dataGridMode = "preprocess";
  grid.classList.add("dashboard-grid", "grid-stack");
  grid.classList.remove("single");
  const saved = loadDataGridLayout();
  grid.innerHTML = views.map(view => dataGridItemHtml(view, normalizeDataGridLayout(view, saved[view] || defaultDataGridLayout(view, views.length)))).join("");
  dataGrid = GridStack.init({
    column: 4,
    cellHeight: 260,
    margin: 8,
    float: true,
    animate: true,
    draggable: { handle: ".chart-head" },
    resizable: { handles: "se" }
  }, grid);
  grid.setAttribute("gs-column", "4");
  updateDataGridCellHeight();
  dataGrid.compact();
  dataGrid.on("change dragstop resizestop", () => {
    syncDataGridAttributes();
    saveDataGridLayout();
    requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
  });
  syncDataGridAttributes();
  requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
}

function updateDataGridCellHeight() {
  if (!dataGrid) return;
  const grid = $("chartGrid");
  if (!grid) return;
  const columnWidth = grid.clientWidth / 4;
  dataGrid.cellHeight(Math.max(220, Math.round(columnWidth)));
}

function syncDataGridAttributes() {
  if (!dataGrid) return;
  dataGrid.getGridItems().forEach(item => {
    const node = item.gridstackNode;
    if (!node) return;
    item.setAttribute("gs-x", node.x);
    item.setAttribute("gs-y", node.y);
    item.setAttribute("gs-w", node.w);
    item.setAttribute("gs-h", node.h);
  });
}

function loadDataGridLayout() {
  try {
    return JSON.parse(localStorage.getItem("preprocessGridLayoutV4") || "{}");
  } catch (err) {
    return {};
  }
}

function loadTrainGridLayout() {
  try {
    return JSON.parse(localStorage.getItem("trainGridLayoutV1") || "{}");
  } catch (err) {
    return {};
  }
}

function defaultDataGridLayout(view, viewCount = 2) {
  return ({
    raw: { x: 0, y: 0, w: 2, h: 2 },
    standardized: { x: 2, y: 0, w: 2, h: 2 },
    single_corr: { x: 0, y: 2, w: 2, h: 2 },
    all_corr: { x: 2, y: 2, w: 2, h: 2 }
  })[view] || { x: 0, y: 0, w: 2, h: 2 };
}

function dataGridMinWidth(view) {
  return 1;
}

function normalizeDataGridLayout(view, layout) {
  const minW = dataGridMinWidth(view);
  const next = { ...defaultDataGridLayout(view), ...layout };
  next.w = Math.max(minW, Math.min(4, Number(next.w) || minW));
  next.h = Math.max(1, Number(next.h) || 1);
  next.x = Math.max(0, Math.min(4 - next.w, Number(next.x) || 0));
  next.y = Math.max(0, Number(next.y) || 0);
  return next;
}

function dataGridItemHtml(view, layout) {
  const minW = dataGridMinWidth(view);
  return `<div class="grid-stack-item" data-view="${view}" gs-x="${layout.x}" gs-y="${layout.y}" gs-w="${layout.w}" gs-h="${layout.h}" gs-min-w="${minW}" gs-min-h="1"><div class="grid-stack-item-content">${chartCardHtml(view, chartTitle(view), chartSub(view, dataCache), dataCardSize(view))}</div></div>`;
}

function renderTrainDashboard(grid, views, frame) {
  dataGridMode = "train";
  grid.classList.add("dashboard-grid", "grid-stack");
  grid.classList.remove("single");
  const saved = loadTrainGridLayout();
  grid.innerHTML = views.map(view => {
    const layout = normalizeTrainGridLayout(view, saved[view] || defaultTrainGridLayout(view));
    return trainGridItemHtml(view, layout, frame);
  }).join("");
  dataGrid = GridStack.init({
    column: 4,
    cellHeight: 260,
    margin: 8,
    float: true,
    animate: true,
    draggable: { handle: ".chart-head" },
    resizable: { handles: "se" }
  }, grid);
  grid.setAttribute("gs-column", "4");
  updateDataGridCellHeight();
  dataGrid.compact();
  dataGrid.on("change dragstop resizestop", () => {
    syncDataGridAttributes();
    saveDataGridLayout();
    requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
  });
  syncDataGridAttributes();
  requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
}

function trainViewHtml(view, frame) {
  if (view === "calc") return infoCardHtml("calc", "本轮计算过程", calcHtml(frame));
  if (view === "table") return infoCardHtml("table", "每轮参数表", tableHtml(currentFrame));
  return chartCardHtml(view, chartTitle(view), chartSub(view, trainData), trainCardSize(view));
}

function defaultTrainGridLayout(view) {
  return ({
    model_train: { x: 0, y: 0, w: 2, h: 2 },
    learning: { x: 2, y: 0, w: 2, h: 2 },
    gradient: { x: 0, y: 2, w: 1, h: 1 },
    w_path: { x: 1, y: 2, w: 1, h: 1 },
    b_path: { x: 2, y: 2, w: 1, h: 1 },
    rmse: { x: 3, y: 2, w: 1, h: 1 },
    mae: { x: 0, y: 3, w: 1, h: 1 },
    r2: { x: 1, y: 3, w: 1, h: 1 },
    calc: { x: 0, y: 4, w: 4, h: 2 },
    table: { x: 0, y: 6, w: 4, h: 1 }
  })[view] || { x: 0, y: 0, w: 1, h: 1 };
}

function normalizeTrainGridLayout(view, layout) {
  const next = { ...defaultTrainGridLayout(view), ...layout };
  next.w = Math.max(1, Math.min(4, Number(next.w) || 1));
  next.h = Math.max(1, Number(next.h) || 1);
  next.x = Math.max(0, Math.min(4 - next.w, Number(next.x) || 0));
  next.y = Math.max(0, Number(next.y) || 0);
  return next;
}

function trainGridItemHtml(view, layout, frame) {
  return `<div class="grid-stack-item" data-view="${view}" gs-x="${layout.x}" gs-y="${layout.y}" gs-w="${layout.w}" gs-h="${layout.h}" gs-min-w="1" gs-min-h="1"><div class="grid-stack-item-content">${trainViewHtml(view, frame)}</div></div>`;
}

function renderTrainShell() {
  document.querySelector(".shell").classList.remove("theory");

          <label class="check-row"><input type="checkbox" name="trainViews" value="gradient"> 梯度下降图</label>
          <label class="check-row"><input type="checkbox" name="trainViews" value="w_path"> w 参数轨迹</label>
          <label class="check-row"><input type="checkbox" name="trainViews" value="b_path"> b 参数轨迹</label>

async function prepareTraining() {
  const feature = $("trainFeature").value;
  $("topFeature").textContent = `当前特征 ${feature}`;
  try {
    trainData = await postJson("/api/train_prepare", {
      feature,
      use_standardized: $("trainStd").value === "1",
      learning_rate: Number($("lr").value),
      epochs: Number($("epochs").value),
      w0: Number($("w0").value),
      b0: Number($("b0").value)
    });
    $("sampleCount").textContent = trainData.scatter.x.length;
  $("featureCount").textContent = FEATURE_NAMES.length;
  currentFrame = 0;
  renderTrainFrame(0);
  } catch (err) {
    renderError(err.message);
  }
}

function renderTrainFrame(index) {
  if (!trainData) return;
  currentFrame = Math.max(0, Math.min(index, trainData.history.length - 1));
  const frame = trainData.history[currentFrame];
  $("epochNow").textContent = frame.epoch;
  $("lossNow").textContent = Number(frame.loss).toFixed(4);
  destroyDataGrid();
  disposeCharts();
  const views = selectedValues("trainViews");
  saveCheckedValues("trainViews", "trainSelectedViewsV1");
  const grid = $("chartGrid");
  $("trainModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择显示模式";
  grid.classList.toggle("single", views.length === 1);
  grid.classList.remove("dashboard-grid", "grid-stack");
  if (!views.length) {
    grid.innerHTML = `<div class="empty-state">请选择至少一个显示模式。</div>`;
    return;
  }
  if (window.GridStack) {
    renderTrainDashboard(grid, views, frame);
  } else {
    grid.innerHTML = views.map(view => trainViewHtml(view, frame)).join("");
  }
  /*
    if (view === "calc") return infoCardHtml("calc", "本轮计算过程", calcHtml(frame));
    if (view === "table") return infoCardHtml("table", "每轮参数表", tableHtml(currentFrame));
    return chartCardHtml(view, chartTitle(view), chartSub(view, trainData), trainCardSize(view));
  }).join("");
  */
  views.forEach(view => {
    if (view === "calc" || view === "table") return;
    const ch = initChart(`chart_${view}`);
    if (view === "model_train") ch.setOption(trainScatterOption(currentFrame), true);
    if (view === "learning") ch.setOption(lossOption(currentFrame), true);
    if (view === "gradient") ch.setOption(contourOption(currentFrame), true);
    if (view === "w_path") ch.setOption(paramPathOption("w", currentFrame), true);
    if (view === "b_path") ch.setOption(paramPathOption("b", currentFrame), true);
    if (view === "rmse") ch.setOption(metricOption("rmse", currentFrame), true);
    if (view === "mae") ch.setOption(metricOption("mae", currentFrame), true);
    if (view === "r2") ch.setOption(metricOption("r2", currentFrame), true);
  });
}

function chartCardHtml(key, title, sub, size = "") {
  return `<section class="chart-card ${size}"><div class="chart-head"><div><div class="chart-title">${title}</div><div class="chart-sub">${sub}</div></div></div><div class="chart" id="chart_${key}"></div></section>`;
}

function infoCardHtml(key, title, html) {
  return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">${title}</div><div class="chart-sub">随当前 epoch 更新</div></div></div><div style="padding:18px">${html}</div></section>`;
}

function dataCardSize(view) {
  return view === "all_corr" ? "wide" : "";
}

function trainCardSize(view) {
  if (["gradient", "model_train"].includes(view)) return "wide";
  if (["w_path", "b_path", "rmse", "mae", "r2"].includes(view)) return "small";
  return "";
}

function chartTitle(view) {
  if (view === "r2") return "R²";
  return ({
    raw: "原始散点图",
    standardized: "预处理散点图",
    single_corr: "单特征线性相关系数",
    all_corr: "全特征线性相关系数",
    model_train: "模型训练",
    learning: "学习准则",
    gradient: "梯度下降图",
    w_path: "w 参数轨迹",
    b_path: "b 参数轨迹",
    rmse: "RMSE",
    mae: "MAE",
    r2: "R 平方"
  })[view] || view;
}

function chartSub(view, data) {
  if (view === "raw") return `${data.feature} 与 MEDV 的原始关系`;
  if (view === "standardized") return `${data.standardized?.feature_name || data.x_column} 与 MEDV 的关系`;
  if (view === "single_corr") return "当前特征与 MEDV 的 Pearson 相关系数";
  if (view === "all_corr") return "所有特征与 MEDV 的 Pearson 相关系数";
  if (view === "model_train") return "样本点、当前回归线和最优参考线";
  if (view === "learning") return "MSE Loss 随 epoch 的变化";
  if (view === "gradient") return "w-b 参数空间中的损失变化";
  if (view === "w_path") return "w 随训练轮数的变化";
  if (view === "b_path") return "b 随训练轮数的变化";
  if (["rmse", "mae", "r2"].includes(view)) return "评价指标随训练轮数的变化";
  return "";
}

async function postJson(url, payload) {
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || "请求失败");
  return data;
}

    yAxis: { type: "value", name: "MEDV", nameLocation: "middle", nameGap: 38 },
    dataZoom: [
      { type: "inside", xAxisIndex: 0, filterMode: "none" },
      { type: "inside", yAxisIndex: 0, filterMode: "none" }
    ],
    media: [
      {
        query: { maxWidth: 360 },
        option: {
          legend: { show: false },
          grid: { left: 42, right: 10, top: 18, bottom: 34 },
          xAxis: { nameGap: 20, nameTextStyle: { fontSize: 10 }, axisLabel: { fontSize: 10 } },
          yAxis: { nameGap: 26, nameTextStyle: { fontSize: 10 }, axisLabel: { fontSize: 10 } },
          series: [
            { symbolSize: 5 },
            { lineStyle: { width: 2.4 } }
          ]
        }
      },
      {
        query: { maxHeight: 260 },
        option: {
          legend: { show: false },
          grid: { left: 38, right: 8, top: 12, bottom: 28 },
          xAxis: { name: "", axisLabel: { fontSize: 9 } },
          yAxis: { name: "", axisLabel: { fontSize: 9 } },
          series: [
            { symbolSize: 4 },
            { lineStyle: { width: 2 } }
          ]
        }
      }
    ],
    series: [
      { name: "样本点", type: "scatter", data: points, symbolSize: 6, itemStyle: { color: "rgba(91,53,245,.72)" } },
      { name: "线性趋势", type: "line", data: lineData, showSymbol: false, lineStyle: { color: "#0f9f78", width: 3 } }

        query: { maxWidth: 360 },
        option: {
          grid: { left: 38, right: 8, top: 28, bottom: 36 },

          yAxis: { nameGap: 20, nameTextStyle: { fontSize: 10 }, axisLabel: { fontSize: 10 } },

      },
      {
        query: { maxHeight: 260 },
        option: {
          grid: { left: 34, right: 8, top: 12, bottom: 26 },
          xAxis: { axisLabel: { fontSize: 9 } },

    grid: { left: 84, right: 28, top: 42, bottom: 42 },

    media: [
      {
        query: { maxWidth: 360 },
        option: {
          grid: { left: 54, right: 8, top: 18, bottom: 26 },
          xAxis: { name: "", axisLabel: { fontSize: 10 } },
          yAxis: { axisLabel: { fontSize: 10 } },
          series: [{ barWidth: 10 }]
        }
      },
      {
        query: { maxHeight: 260 },
        option: {
          grid: { left: 48, right: 8, top: 12, bottom: 20 },
          xAxis: { name: "", axisLabel: { fontSize: 9 } },
          yAxis: { axisLabel: { fontSize: 9 } },
          series: [{ barWidth: 8 }]
        }
      }
    ],
    series: [{ type: "bar", barWidth: 14, data: ordered.map(r => ({ value: r.corr, itemStyle: { color: r.feature === currentFeature ? "#c47a11" : (r.corr >= 0 ? "#5b35f5" : "#d9354f") } })) }]
  };

function lineForParams(w, b) {
  return trainData.line_x.map(x => [x, w * x + b]);
}

function trainScatterOption(frameIndex) {
  const frame = trainData.history[frameIndex];
  const points = trainData.scatter.x.map((x, i) => [x, trainData.scatter.y[i]]);
  return {
    tooltip: { trigger: "item" },
    legend: { top: 12 },
    grid: { left: 58, right: 24, top: 56, bottom: 48 },
    xAxis: { type: "value", name: trainData.x_column, nameLocation: "middle", nameGap: 28 },
    yAxis: { type: "value", name: "MEDV", nameLocation: "middle", nameGap: 38 },
    dataZoom: [
      { type: "inside", xAxisIndex: 0, filterMode: "none" },
      { type: "inside", yAxisIndex: 0, filterMode: "none" }
    ],
    series: [
      { name: "样本点", type: "scatter", data: points, symbolSize: 6, itemStyle: { color: "rgba(91,53,245,.7)" } },
      { name: "当前回归线", type: "line", data: lineForParams(frame.w, frame.b), showSymbol: false, lineStyle: { color: "#d9354f", width: 3 } },
      { name: "最优参考线", type: "line", data: lineForParams(trainData.best.w, trainData.best.b), showSymbol: false, lineStyle: { color: "#0f9f78", width: 2.6, type: "dashed" } }
    ]
  };
}

function lossOption(frameIndex) {
  const rows = trainData.history.slice(0, frameIndex + 1);
  return lineOption("学习准则：MSE Loss", "MSE", rows.map(r => [r.epoch, r.loss]), "#5b35f5");
}

function paramPathOption(key, frameIndex) {
  const rows = trainData.history.slice(0, frameIndex + 1);
  return lineOption(key === "w" ? "w 参数轨迹" : "b 参数轨迹", key, rows.map(r => [r.epoch, r[key]]), key === "w" ? "#0f9f78" : "#c47a11");
}

function metricOption(key, frameIndex) {
  const rows = trainData.history.slice(0, frameIndex + 1);
  const label = key === "rmse" ? "RMSE" : key === "mae" ? "MAE" : "R 平方";
  const metricTitle = key === "r2" ? "R²" : label;
  return lineOption(metricTitle, metricTitle, rows.map(r => [r.epoch, r[key]]), key === "r2" ? "#0f9f78" : "#c47a11");
}

function lineOption(title, yName, data, color) {
  return {
    tooltip: { trigger: "axis" },
    grid: { left: 58, right: 24, top: 42, bottom: 42 },
    xAxis: { type: "value", name: "epoch" },
    yAxis: { type: "value", name: yName },
    dataZoom: [{ type: "inside", xAxisIndex: 0, filterMode: "none" }],
    series: [{ type: "line", smooth: true, symbolSize: 5, data, lineStyle: { color, width: 3 }, areaStyle: { color: color + "22" } }]
  };
}

function contourOption(frameIndex) {
  const c = trainData.contour;
  const frame = trainData.history[frameIndex];
  const values = c.values.map(v => [c.w_axis[v[0]], c.b_axis[v[1]], v[2]]);
  return {
    tooltip: { formatter: p => `w=${p.value[0].toFixed(3)}<br>b=${p.value[1].toFixed(3)}<br>MSE=${p.value[2].toFixed(3)}` },
    grid: { left: 58, right: 92, top: 42, bottom: 44 },
    xAxis: { type: "value", name: "w" },
    yAxis: { type: "value", name: "b" },
    visualMap: { min: c.z_min, max: c.z_max, calculable: true, right: 8, top: 70, inRange: { color: ["#f1efff", "#ffe4a3", "#d9354f"] } },
    series: [
      { type: "heatmap", data: values },
      { name: "参数轨迹", type: "line", data: trainData.history.slice(0, frameIndex + 1).map(r => [r.w, r.b]), symbolSize: 6, lineStyle: { color: "#111827", width: 2 } },
      { name: "当前位置", type: "scatter", data: [[frame.w, frame.b]], symbolSize: 15, itemStyle: { color: "#fff", borderColor: "#111827", borderWidth: 3 } }
    ]
  };
}

function calcHtml(frame) {
  return `<div class="formula">epoch = ${frame.epoch}
w = ${frame.w.toFixed(6)}
b = ${frame.b.toFixed(6)}

MSE = ${frame.mse.toFixed(6)}
RMSE = ${frame.rmse.toFixed(6)}
MAE = ${frame.mae.toFixed(6)}
R 平方 = ${frame.r2.toFixed(6)}

dw = ${frame.dw.toFixed(6)}
db = ${frame.db.toFixed(6)}

下一轮 w = ${frame.new_w.toFixed(6)}
下一轮 b = ${frame.new_b.toFixed(6)}</div>`;
}

function tableHtml(frameIndex) {
  const rows = trainData.history.slice(0, frameIndex + 1);
  return `<div class="table-wrap"><table><thead><tr><th>Epoch</th><th>w</th><th>b</th><th>MSE</th><th>RMSE</th><th>MAE</th><th>R 平方</th><th>dw</th><th>db</th></tr></thead><tbody>${rows.map(r => `<tr><td>${r.epoch}</td><td>${r.w.toFixed(6)}</td><td>${r.b.toFixed(6)}</td><td>${r.mse.toFixed(6)}</td><td>${r.rmse.toFixed(6)}</td><td>${r.mae.toFixed(6)}</td><td>${r.r2.toFixed(6)}</td><td>${r.dw.toFixed(6)}</td><td>${r.db.toFixed(6)}</td></tr>`).join("")}</tbody></table></div>`;
}

function startAuto() {
  if (!trainData) return;
  stopAuto();
  timer = setInterval(() => {
    if (currentFrame >= trainData.history.length - 1) {
      stopAuto();
      return;
    }
    renderTrainFrame(currentFrame + 1);
  }, Number($("speed").value));
}

function stopAuto() {
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
}

function renderError(message) {
  $("main").innerHTML = `<section class="content-card"><h2>加载失败</h2><p>${message}</p></section>`;
}

function renderTheoryHtmlSlot(page) {
  const src = `/static/theory-html/${page}.html`;
  return `<div class="html-lesson hidden" data-theory-html="${src}"><iframe title="理论讲义"></iframe></div>`;
}

async function loadTheoryHtml(page) {
  const wrap = document.querySelector("[data-theory-html]");
  if (!wrap) return;
  const src = wrap.dataset.theoryHtml;
  try {
    const resp = await fetch(src, { cache: "no-store" });
    if (!resp.ok) return;
    const html = await resp.text();
    const iframe = wrap.querySelector("iframe");
    iframe.setAttribute("scrolling", "no");
    iframe.onload = () => fitTheoryIframe(iframe);
    iframe.srcdoc = html;
    wrap.classList.remove("hidden");
  } catch (err) {
    // Converted HTML is optional; missing files should not affect the lesson page.
  }
}

function fitTheoryIframe(iframe) {
  const resize = () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || !doc.body) return;
      doc.documentElement.style.overflow = "hidden";
      doc.body.style.overflow = "hidden";
      const height = Math.max(
        doc.body.scrollHeight,
        doc.documentElement.scrollHeight,
        doc.body.offsetHeight,
        doc.documentElement.offsetHeight
      );
      iframe.style.height = `${height + 20}px`;
    } catch (err) {
      iframe.style.height = "680px";
    }
  };
  resize();
  setTimeout(resize, 100);
  setTimeout(resize, 500);
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (doc && "ResizeObserver" in window) {
      const observer = new ResizeObserver(resize);
      observer.observe(doc.body);
    }
  } catch (err) {}
}

document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => setPage(btn.dataset.page)));
const jumpExperiment = $("jumpExperiment");
if (jumpExperiment) jumpExperiment.addEventListener("click", () => setPage("preprocess"));
window.addEventListener("resize", () => {
  updateDataGridCellHeight();
  charts.forEach(ch => ch.resize());
});
setPage("basic");
