<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简单线性回归教学实验</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --soft: #f6f7fb;
      --text: #172033;
      --muted: #6b7280;
      --line: #e6e8ef;
      --purple: #5b35f5;
      --purple-soft: #f1efff;
      --green: #0f9f78;
      --green-soft: #eafaf4;
      --amber: #c47a11;
      --amber-soft: #fff7e8;
      --rose: #d9354f;
      --blue: #2563eb;
      --shadow: 0 18px 46px rgba(31, 41, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(91, 53, 245, .38) transparent;
    }
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    *::-webkit-scrollbar-track {
      background: transparent;
    }
    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(91, 53, 245, .42), rgba(15, 159, 120, .38));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(91, 53, 245, .72), rgba(15, 159, 120, .62));
      background-clip: padding-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }
    button, select, input { font: inherit; }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: 44px minmax(0, 1fr);
      background: #fff;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .brand p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions.hidden-top {
      display: none;
    }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--text);
    }
    .shell {
      min-height: 0;
      height: calc(100vh - 44px);
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 320px;
      overflow: hidden;
    }
    .shell.theory {
      grid-template-columns: 250px minmax(0, 1fr);
    }
    .shell.theory .assistant {
      display: none;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 22px 16px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    .main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fb 100%);
      overflow: auto;
      padding: 32px;
    }
    .assistant {
      border-left: 1px solid var(--line);
      background: #fff;
      padding: 28px 24px;
      min-height: 0;
      height: 100%;
      overflow: auto;
    }
    details.nav-section {
      border-bottom: 1px solid var(--line);
      padding: 0 0 16px;
      margin-bottom: 18px;
    }
    details.nav-section summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 14px;
    }
    details.nav-section summary::-webkit-details-marker { display: none; }
    .chev {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      display: grid;
      place-items: center;
      transition: transform .18s ease;
    }
    details[open] .chev { transform: rotate(90deg); }
    .step-list {
      position: relative;
      display: grid;
      gap: 0;
      padding-left: 14px;
    }
    .step-list:before {
      content: "";
      position: absolute;
      left: 10px;
      top: 14px;
      bottom: 14px;
      width: 1px;
      background: var(--line);
    }
    .nav-btn {
      position: relative;
      width: 100%;
      border: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      text-align: left;
      padding: 10px 0;
      color: var(--text);
      border-radius: 12px;
    }
    .nav-btn:focus,
    .nav-btn:focus-visible,
    details.nested-section summary:focus,
    details.nested-section summary:focus-visible {
      outline: none;
    }
    .nav-btn:hover {
      background: var(--purple-soft);
    }
    .dot {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #cfd5df;
      background: #fff;
      margin-top: 2px;
      transition: all .18s ease;
    }
    .nav-btn strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    .nav-btn > span:not(.dot) {
      display: block !important;
      min-width: 0;
    }
    .nav-btn > span:not(.dot) strong {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .nav-btn > span:not(.dot) > span:not(.chev) {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
    }
    .nav-btn:hover strong { color: var(--purple); }
    .nav-btn:hover .dot {
      border-color: var(--purple);
    }
    .nav-btn.active .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .nav-btn.active strong { color: var(--purple); }
    .nav-subhead {
      margin: 8px 0 4px 32px;
      color: #111827;
      font-weight: 900;
      font-size: 13px;
    }
    details.nested-section {
      position: relative;
      padding: 0;
      margin: 0;
    }
    details.nested-section summary {
      list-style: none;
      display: grid;
      grid-template-columns: 22px 1fr 22px;
      align-items: start;
      gap: 10px;
      color: var(--text);
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 0 6px;
    }
    details.nested-section summary::-webkit-details-marker { display: none; }
    details.nested-section summary:hover {
      background: var(--purple-soft);
      color: var(--purple);
    }
    details.nested-section summary strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }
    details.nested-section summary span.sub {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 3px;
      font-weight: 400;
    }
    details.nested-section summary:hover .dot {
      border-color: var(--purple);
    }
    details.nested-section.active summary strong {
      color: var(--purple);
    }
    details.nested-section.active summary > .dot {
      border-color: var(--purple);
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    details.nested-section .step-list {
      padding-left: 22px;
      margin-top: 0;
      gap: 0;
    }
    details.nested-section .step-list:before {
      left: 18px;
      top: 6px;
    }
    details.nested-section .nav-btn {
      padding: 7px 0;
    }
    details.nested-section .nav-btn strong {
      font-size: 14px;
    }
    details.nested-section .chev {
      margin-top: 0;
    }
    .hero-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 20px;
    }
    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--purple);
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .lead {
      margin: 10px 0 0;
      color: #4b5563;
      line-height: 1.75;
      max-width: 900px;
    }
    .primary-btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--purple), #3919d8);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 12px 22px rgba(91, 53, 245, .22);
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      background: #fff;
      min-height: 112px;
    }
    .stat-card.purple { background: #f7f5ff; }
    .stat-card.green { background: #effcf6; }
    .stat-card.amber { background: #fffaf0; }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .stat-card strong {
      display: block;
      font-size: 34px;
      line-height: 1;
    }
    .content-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .content-card p {
      margin: 10px 0;
      line-height: 1.9;
      color: #283449;
      font-size: 16px;
    }
    .html-lesson {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      padding: 0;
    }
    .html-lesson iframe {
      width: 100%;
      min-height: 120px;
      border: 0;
      background: #fff;
      display: block;
    }
    .formula {
      white-space: pre-wrap;
      font-family: Consolas, "Microsoft YaHei", monospace;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      line-height: 1.75;
      overflow: auto;
      color: #172033;
    }
    .best-param-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .best-param {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      min-width: 0;
    }
    .best-param span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .best-param strong {
      display: block;
      font-family: Consolas, "Microsoft YaHei", monospace;
      font-size: 17px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    @media (max-width: 860px) {
      .best-param-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(520px, 100%), 1fr));
      gap: 18px;
      align-items: start;
    }
    .chart-grid.single {
      grid-template-columns: minmax(min(680px, 100%), 980px);
      justify-content: center;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 455px;
      height: clamp(455px, 54vh, 620px);
      max-height: 820px;
      resize: vertical;
    }
    .chart-card::after {
      content: "";
      position: absolute;
      right: 10px;
      bottom: 9px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: .42;
      background:
        linear-gradient(135deg, transparent 54%, #9aa3b2 56%, #9aa3b2 62%, transparent 64%),
        linear-gradient(135deg, transparent 68%, #9aa3b2 70%, #9aa3b2 76%, transparent 78%);
    }
    .chart-card.wide { grid-column: 1 / -1; }
    .chart-card.small {
      min-height: 340px;
      height: clamp(340px, 42vh, 480px);
    }
    .chart-head {
      padding: 16px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      font-weight: 900;
      font-size: 16px;
    }
    .chart-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .chart-grid.single .chart-card {
      min-height: 540px;
      height: clamp(540px, 66vh, 740px);
    }
    .chart-card.wide {
      min-height: 500px;
      height: clamp(500px, 58vh, 680px);
    }
    .info-card-body {
      min-height: 0;
      overflow: auto;
    }
    .chart-card.wide > div[style*="padding:18px"] {
      min-height: 0;
      overflow: auto;
    }
    .dashboard-grid {
      display: block;
      position: relative;
      min-height: 640px;
    }
    .dashboard-grid.grid-stack {
      width: 100%;
      overflow: visible;
    }
    .dashboard-grid.grid-stack > .grid-stack-item {
      position: absolute;
      min-width: 0;
    }
    .dashboard-grid .grid-stack-item-content {
      position: absolute;
      inset: 8px;
      overflow: visible;
    }
    .dashboard-grid .chart-card {
      height: 100%;
      min-height: 0;
      max-height: none;
      resize: none;
    }
    .dashboard-grid .chart-head {
      cursor: grab;
    }
    .dashboard-grid .chart-head:active {
      cursor: grabbing;
    }
    .dashboard-grid .ui-resizable-se {
      width: 22px;
      height: 22px;
      right: 8px;
      bottom: 8px;
    }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="0"] { left: 0%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="1"] { left: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="2"] { left: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-x="3"] { left: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="1"] { width: 25%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="2"] { width: 50%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="3"] { width: 75%; }
    .dashboard-grid[gs-column="4"] > .grid-stack-item[gs-w="4"] { width: 100%; }
    .empty-state {
      border: 1px dashed #cfd5df;
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      color: var(--muted);
      padding: 30px;
    }
    .right-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 18px;
    }
    .right-title:before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--purple);
      box-shadow: 0 0 0 5px var(--purple-soft);
    }
    .helper-card, .control-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    details.control-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    details.control-card summary::-webkit-details-marker { display: none; }
    details.control-card summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
      transition: transform .18s ease;
    }
    details.control-card[open] summary:after {
      transform: rotate(180deg);
    }
    .helper-card h3, .control-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    details.control-card summary h3 {
      margin: 0;
    }
    details.control-card[open] summary {
      margin-bottom: 10px;
    }
    .helper-card p {
      color: #4b5563;
      line-height: 1.75;
      margin: 0 0 10px;
      font-size: 14px;
    }
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcff;
      text-align: center;
    }
    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .mini-stat strong {
      display: block;
      font-size: 23px;
    }
    label.control-label {
      display: block;
      font-weight: 900;
      margin: 14px 0 8px;
      font-size: 13px;
    }
    select, input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      outline: none;
      padding: 0 12px;
      color: var(--text);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--purple);
    }
    .check-list {
      display: grid;
      gap: 8px;
    }
    details.mode-menu {
      position: relative;
    }
    details.mode-menu summary {
      list-style: none;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 900;
      color: var(--text);
    }
    details.mode-menu summary::-webkit-details-marker { display: none; }
    details.mode-menu summary:after {
      content: "⌄";
      color: var(--muted);
      font-size: 18px;
    }
    details.mode-menu[open] summary:after {
      transform: rotate(180deg);
    }
    details.mode-menu .check-list {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      box-shadow: var(--shadow);
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      color: #273244;
      background: #fff;
      user-select: none;
    }
    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
    }
    .check-row:has(input:checked) {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: #321aa2;
      font-weight: 800;
    }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .range-line {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      color: #fff;
      height: 38px;
      font-weight: 900;
    }
    .btn.primary { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.dark { background: #4b5563; }
    .btn.rose { background: var(--rose); }
    .runtime {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .runtime div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .runtime strong { color: var(--text); }
    .table-wrap {
      overflow: auto;
      max-height: 430px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .table-note {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      white-space: nowrap;
      text-align: left;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }
    .format-grid {
      display: grid;
      grid-template-columns: minmax(0, .86fr) minmax(360px, 1.14fr);
      gap: 18px;
      align-items: start;
    }
    .format-points {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .format-point {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px;
      color: #273244;
      line-height: 1.65;
    }
    .format-point strong {
      display: block;
      margin-bottom: 3px;
      color: #111827;
    }
    .sample-caption {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .status-line {
      margin-top: 12px;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #eff6ff;
      color: #1e3a8a;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }
    .status-line.error {
      border-color: #fecdd3;
      background: #fff1f2;
      color: #9f1239;
    }
    .stage-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stage-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      min-width: 0;
    }
    .stage-chip span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .stage-chip strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .stage-chip.active {
      border-color: #c9c1ff;
      background: var(--purple-soft);
      color: #321aa2;
    }
    .section-status {
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .section-status.ready {
      border-color: #bbf7d0;
      color: #047857;
      background: #ecfdf5;
    }
    .section-status.warn {
      border-color: #fde68a;
      color: #92400e;
      background: #fffbeb;
    }
    .hidden { display: none !important; }
    @media (max-width: 1260px) {
      .shell { grid-template-columns: 240px minmax(0, 1fr); }
      .shell.theory { grid-template-columns: 240px minmax(0, 1fr); }
      .assistant { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 860px) {
      .app { grid-template-rows: auto minmax(0, 1fr); }
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px; }
      .shell, .shell.theory, .chart-grid, .chart-grid.single, .stat-cards, .format-grid, .stage-strip { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .chart-card.wide { grid-column: auto; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">ML</div>
      <div>
        <h1>简单线性回归教学实验</h1>
        <p>机器学习基础实验 / Boston Housing 房价预测</p>
      </div>
    </div>
    <div class="top-actions hidden-top">
      <span class="pill" id="topFeature">当前特征 RM</span>
      <button class="primary-btn" type="button" id="jumpExperiment">开始实验</button>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <details class="nav-section" open>
        <summary>理论部分 <span class="chev">›</span></summary>
        <div class="step-list">
          <button class="nav-btn" data-page="basic" type="button"><span class="dot"></span><span><strong>实验基本信息</strong><span>实验背景与任务</span></span></button>
          <button class="nav-btn" data-page="purpose" type="button"><span class="dot"></span><span><strong>实验目的</strong><span>你需要掌握什么</span></span></button>
          <button class="nav-btn" data-page="knowledge" type="button"><span class="dot"></span><span><strong>前置知识</strong><span>线性函数与误差</span></span></button>
          <details class="nested-section" open>
            <summary><span class="dot"></span><span><strong>模型介绍</strong><span class="sub">数据、模型和指标</span></span><span class="chev">›</span></summary>
            <div class="step-list">
              <button class="nav-btn" data-page="dataset" type="button"><span class="dot"></span><span><strong>数据集</strong><span>特征、标签和标准化</span></span></button>
              <button class="nav-btn" data-page="model" type="button"><span class="dot"></span><span><strong>训练模型</strong><span>y = wx + b</span></span></button>
              <button class="nav-btn" data-page="criterion" type="button"><span class="dot"></span><span><strong>学习准则</strong><span>MSE 损失函数</span></span></button>
              <button class="nav-btn" data-page="optimization" type="button"><span class="dot"></span><span><strong>参数优化</strong><span>梯度下降更新</span></span></button>
              <button class="nav-btn" data-page="evaluation" type="button"><span class="dot"></span><span><strong>评价指标</strong><span>RMSE、MAE、R 平方</span></span></button>
            </div>
          </details>
          <button class="nav-btn" data-page="result" type="button"><span class="dot"></span><span><strong>预期成果</strong><span>实验完成标准</span></span></button>
          <button class="nav-btn" data-page="thinking" type="button"><span class="dot"></span><span><strong>思考拓展</strong><span>从单特征到多特征</span></span></button>
        </div>
      </details>

      <details class="nav-section" open>
        <summary>实验部分 <span class="chev">›</span></summary>
        <div class="step-list">
          <button class="nav-btn" data-page="preprocess" type="button"><span class="dot"></span><span><strong>数据预处理</strong><span>观察数据与相关性</span></span></button>
          <button class="nav-btn" data-page="train_eval" type="button"><span class="dot"></span><span><strong>模型训练与评估</strong><span>训练、优化和指标</span></span></button>
          <button class="nav-btn" data-page="predict" type="button"><span class="dot"></span><span><strong>模型预测</strong><span>后续接入预测流程</span></span></button>
          <button class="nav-btn" data-page="student" type="button"><span class="dot"></span><span><strong>自主实验</strong><span>上传数据并完成训练</span></span></button>
        </div>
      </details>
    </aside>

    <main class="main" id="main"></main>

    <aside class="assistant">
      <div id="rightPanel"></div>
    </aside>
  </div>
</div>

<script>
const FEATURE_NAMES = {{ feature_names | tojson }};
const DEFAULT_FEATURE = {{ default_feature | tojson }};

const $ = (id) => document.getElementById(id);
const charts = new Map();
const chartResizeObservers = new Map();
let dataGrid = null;
let dataGridMode = null;
let currentPage = "basic";
let dataCache = null;
let trainData = null;
let predictData = null;
let studentMeta = null;
let studentData = null;
let studentPredictData = null;
let studentRenderViewsKey = "";
let studentStage = "数据集";
let studentTrainDirty = false;
let currentFrame = 0;
let timer = null;
let trainRenderViewsKey = "";

const theoryPages = {
  basic: {
    title: "实验基本信息",
    sub: "本实验用真实 Boston Housing 数据演示简单线性回归的完整流程。",
    body: [
      "实验围绕一个输入特征 x 和一个目标变量 y 展开，目标是学习一条直线来预测房价。",
      "页面左侧是教学流程，中间是理论内容或实验图表，右侧在理论阶段提供学习提示，在实验阶段显示可操作参数。"
    ],
    helper: ["先理解任务目标，再进入数据预处理。", "本实验当前默认使用 RM 作为输入特征，目标变量为 MEDV。"]
  },
  purpose: {
    title: "实验目的",
    sub: "完成本实验后，学生应能解释线性回归训练过程中的关键概念。",
    body: ["理解数据标准化、相关系数、回归直线、损失函数、梯度下降和评价指标。", "能够观察 w、b 的变化，并用 RMSE、MAE、R 平方判断模型效果。"],
    helper: ["重点不是只看最终答案，而是看参数如何一步步接近更合适的位置。"]
  },
  knowledge: {
    title: "前置知识",
    sub: "进入实验前需要了解的数学与机器学习基础。",
    body: ["线性函数 y = wx + b 描述一条直线。w 控制斜率，b 控制截距。", "误差表示预测值和真实值之间的差距，训练过程会不断减小整体误差。"],
    helper: ["如果对梯度不熟，可以先把它理解为参数应该调整的方向。"]
  },
  dataset: {
    title: "数据集",
    sub: "认识特征、标签和标准化数据。",
    body: ["数据集包含 13 个输入特征，目标变量为 MEDV。实验默认选择 RM 作为输入特征。", "数据预处理模块中可以同时选择多个图表，例如原始散点图、预处理散点图和相关系数图。"],
    helper: ["特征是模型用来做预测的信息。目标变量是我们希望模型预测的结果。", "标准化不会改变线性相关性的方向，但会让梯度下降更容易控制。"]
  },
  model: {
    title: "训练模型",
    sub: "简单线性回归使用一条直线建立 x 和 y 的关系。",
    formula: "预测函数：y_hat = w * x + b\n\nw：斜率，表示 x 每变化 1 个单位时预测值的变化量。\nb：截距，表示 x 为 0 时模型给出的基础预测值。",
    helper: ["在图中，w 改变直线倾斜程度，b 改变直线上下位置。"]
  },
  criterion: {
    title: "学习准则",
    sub: "用 MSE 衡量当前模型的整体误差。",
    formula: "MSE = mean((y_hat - y)^2)\n\n训练目标：找到让 MSE 尽可能小的 w 和 b。",
    helper: ["平方误差会放大较大的预测偏差，因此模型会更关注偏差大的样本。"]
  },
  optimization: {
    title: "参数优化",
    sub: "梯度下降根据损失函数的梯度更新参数。",
    formula: "dw = 2 / n * sum((y_hat - y) * x)\ndb = 2 / n * sum(y_hat - y)\n\nw_new = w - learning_rate * dw\nb_new = b - learning_rate * db",
    helper: ["学习率太大可能震荡，太小会训练很慢。可以在实验里调节学习率观察变化。"]
  },
  evaluation: {
    title: "评价指标",
    sub: "从不同角度观察模型预测效果。",
    body: ["RMSE 越小，说明预测偏差通常越小。MAE 越小，说明平均绝对误差越小。", "R 平方越接近 1，说明模型对目标变量变化的解释能力越强。"],
    helper: ["单个指标不能说明全部问题，教学展示中可以把 Loss、RMSE、MAE、R 平方一起观察。"]
  },
  result: {
    title: "预期成果",
    sub: "学生完成实验后应能独立解释图表与参数。",
    body: ["能够说明标准化前后散点图的区别。", "能够解释训练过程中 w、b、Loss 和评价指标的变化。"],
    helper: ["检查学生是否真的理解，可以让他解释某一轮参数为什么这样更新。"]
  },
  thinking: {
    title: "思考拓展",
    sub: "从简单线性回归延伸到更复杂的模型。",
    body: ["如果同时使用多个特征，模型会从 y = wx + b 扩展为多元线性回归。", "当特征与目标之间不是线性关系时，简单线性回归可能无法充分拟合数据。"],
    helper: ["可以比较 RM、LSTAT、PTRATIO 等特征，看哪个单特征预测效果更好。"]
  },
  predict: {
    title: "模型预测",
    sub: "该模块暂时保留入口，后续接入预测流程。",
    body: ["后续可以在这里加入输入样本、标准化转换、预测结果和解释说明。"],
    helper: ["预测模块可以复用当前训练得到的 w 和 b。"]
  },
  student: {
    title: "学生训练",
    sub: "该模块暂时保留入口，后续接入学生练习。",
    body: ["后续可以加入任务卡、学生提交、自动判分和过程记录。"],
    helper: ["学生训练区适合放分层任务：基础观察、参数调节、结果解释。"]
  }
};

function featureOptions(selected = DEFAULT_FEATURE) {
  return FEATURE_NAMES.map(f => `<option value="${f}" ${f === selected ? "selected" : ""}>${f}</option>`).join("");
}

function setActive(page) {
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
  const modelPages = ["dataset", "model", "criterion", "optimization", "evaluation"];
  document.querySelectorAll(".nested-section").forEach(section => {
    section.classList.toggle("active", modelPages.includes(page));
  });
}

function disposeCharts() {
  chartResizeObservers.forEach(observer => observer.disconnect());
  chartResizeObservers.clear();
  charts.forEach(ch => ch.dispose());
  charts.clear();
}

function saveDataGridLayout() {
  if (!dataGrid) return;
  const layout = {};
  dataGrid.getGridItems().forEach(item => {
    const node = item.gridstackNode;
    const view = item.dataset.view;
    if (!node || !view) return;
    layout[view] = { x: node.x, y: node.y, w: node.w, h: node.h };
  });
  localStorage.setItem(gridLayoutStorageKey(dataGridMode), JSON.stringify(layout));
}

function gridLayoutStorageKey(mode) {
  if (mode === "train") return "trainGridLayoutV1";
  if (mode === "predict") return "predictGridLayoutV1";
  if (mode === "student") return "studentGridLayoutV1";
  return "preprocessGridLayoutV4";
}

function destroyDataGrid() {
  if (!dataGrid) return;
  saveDataGridLayout();
  dataGrid.destroy(false);
  dataGrid = null;
  dataGridMode = null;
  trainRenderViewsKey = "";
  studentRenderViewsKey = "";
}

function initChart(id) {
  const el = $(id);
  const ch = echarts.init(el);
  charts.set(id, ch);
  const resize = () => ch.resize();
  if ("ResizeObserver" in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(el);
    if (el.parentElement) observer.observe(el.parentElement);
    chartResizeObservers.set(id, observer);
  }
  requestAnimationFrame(resize);
  return ch;
}

function renderTheory(page) {
  document.querySelector(".shell").classList.add("theory");
  const item = theoryPages[page] || theoryPages.dataset;
  $("main").innerHTML = `
    <section class="hero-card">
      <div class="hero-line">
        <div>
          <div class="eyebrow">理论部分</div>
          <h2>${item.title}</h2>
        </div>
      </div>
      ${renderTheoryHtmlSlot(page)}
    </section>
  `;
  $("rightPanel").innerHTML = "";
  loadTheoryHtml(page);
}

function setPage(page) {
  persistActiveViewSelection();
  stopAuto();
  currentPage = page;
  setActive(page);
  destroyDataGrid();
  disposeCharts();
  $("topFeature").textContent = `当前特征 ${currentFeature()}`;
  if (page === "preprocess") {
    renderDataShell();
    loadDataView();
  } else if (page === "train_eval") {
    renderTrainShell();
    prepareTraining();
  } else if (page === "predict") {
    renderPredictShell();
    loadPrediction();
  } else if (page === "student") {
    renderStudentShell();
  } else {
    renderTheory(page);
  }
}

function persistActiveViewSelection() {
  if (currentPage === "preprocess" && document.querySelector('input[name="dataViews"]')) {
    saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
  }
  if (currentPage === "train_eval" && document.querySelector('input[name="trainViews"]')) {
    saveCheckedValues("trainViews", "trainSelectedViewsV1");
  }
  if (currentPage === "predict" && document.querySelector('input[name="predictViews"]')) {
    saveCheckedValues("predictViews", "predictSelectedViewsV1");
  }
}

function currentFeature() {
  const dataFeature = $("dataFeature");
  const trainFeature = $("trainFeature");
  const predictFeature = $("predictFeature");
  return dataFeature?.value || trainFeature?.value || predictFeature?.value || DEFAULT_FEATURE;
}

function selectedValues(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(el => el.value);
}

function restoreCheckedValues(name, storageKey) {
  let values = null;
  try {
    values = JSON.parse(localStorage.getItem(storageKey) || "null");
  } catch (err) {}
  if (!Array.isArray(values)) return;
  const inputs = [...document.querySelectorAll(`input[name="${name}"]`)];
  const validValues = new Set(inputs.map(el => el.value));
  const allowed = new Set(values.filter(value => validValues.has(value)));
  if (values.length && !allowed.size) return;
  inputs.forEach(el => {
    el.checked = allowed.has(el.value);
  });
}

function saveCheckedValues(name, storageKey) {
  localStorage.setItem(storageKey, JSON.stringify(selectedValues(name)));
}

function renderDataShell() {
  document.querySelector(".shell").classList.remove("theory");
  $("main").innerHTML = `
    <section class="hero-card">
      <div class="hero-line">
        <div>
          <div class="eyebrow">实验部分</div>
          <h2>数据预处理</h2>
        </div>
      </div>
      <div class="chart-grid" id="chartGrid"></div>
    </section>`;
  $("rightPanel").innerHTML = `
    <div class="right-title">控制面板</div>
    <div class="control-card">
      <div class="mini-stats">
        <div class="mini-stat"><span>样本总数</span><strong id="sampleCount">--</strong></div>
        <div class="mini-stat"><span>特征数量</span><strong id="featureCount">13</strong></div>
      </div>
      <label class="control-label" for="dataFeature">特征选择</label>
      <select id="dataFeature">${featureOptions(currentFeature())}</select>
      <label class="control-label">显示模式</label>
      <details class="mode-menu">
        <summary id="dataModeSummary">已选择 1 项</summary>
        <div class="check-list">
          <label class="check-row"><input type="checkbox" name="dataViews" value="raw" checked> 原始散点图</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="standardized"> 预处理散点图</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="single_corr"> 单特征线性相关系数</label>
          <label class="check-row"><input type="checkbox" name="dataViews" value="all_corr"> 全特征线性相关系数</label>
        </div>
      </details>
    </div>`;
  $("dataFeature").addEventListener("change", loadDataView);
  restoreCheckedValues("dataViews", "preprocessSelectedViewsV1");
  document.querySelectorAll('input[name="dataViews"]').forEach(el => el.addEventListener("change", () => {
    saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
    renderDataCharts();
  }));
}

async function loadDataView() {
  const feature = $("dataFeature").value;
  $("topFeature").textContent = `当前特征 ${feature}`;
  try {
    dataCache = await postJson("/api/data_view", { feature });
    $("sampleCount").textContent = dataCache.raw.summary.sample_count;
    $("featureCount").textContent = dataCache.correlations.length;
    renderDataCharts();
  } catch (err) {
    renderError(err.message);
  }
}

function renderDataCharts() {
  if (!dataCache) return;
  destroyDataGrid();
  disposeCharts();
  const views = selectedValues("dataViews");
  saveCheckedValues("dataViews", "preprocessSelectedViewsV1");
  const grid = $("chartGrid");
  $("dataModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择显示模式";
  grid.classList.toggle("single", views.length === 1);
  grid.classList.remove("dashboard-grid", "grid-stack");
  if (!views.length) {
    grid.innerHTML = `<div class="empty-state">请选择至少一个显示模式。</div>`;
    return;
  }
  if (window.GridStack) {
    renderDataDashboard(grid, views);
  } else {
    grid.innerHTML = views.map(view => chartCardHtml(view, chartTitle(view), chartSub(view, dataCache), dataCardSize(view))).join("");
  }
  views.forEach(view => {
    const ch = initChart(`chart_${view}`);
    if (view === "raw") ch.setOption(scatterOption(dataCache.raw.scatter, dataCache.raw.trend_line, dataCache.feature, "原始散点图"), true);
    if (view === "standardized") ch.setOption(scatterOption(dataCache.standardized.scatter, dataCache.standardized.trend_line, dataCache.standardized.feature_name, "预处理散点图"), true);
    if (view === "single_corr") ch.setOption(singleCorrOption(dataCache), true);
    if (view === "all_corr") ch.setOption(allCorrOption(dataCache.correlations, dataCache.feature), true);
  });
}

function renderDataDashboard(grid, views) {
  dataGridMode = "preprocess";
  grid.classList.add("dashboard-grid", "grid-stack");
  grid.classList.remove("single");
  const saved = loadDataGridLayout();
  grid.innerHTML = views.map(view => dataGridItemHtml(view, normalizeDataGridLayout(view, saved[view] || defaultDataGridLayout(view, views.length)))).join("");
  dataGrid = GridStack.init({
    column: 4,
    cellHeight: 260,
    margin: 8,
    float: true,
    animate: true,
    draggable: { handle: ".chart-head" },
    resizable: { handles: "se" }
  }, grid);
  grid.setAttribute("gs-column", "4");
  updateDataGridCellHeight();
  dataGrid.compact();
  dataGrid.on("change dragstop resizestop", () => {
    syncDataGridAttributes();
    saveDataGridLayout();
    requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
  });
  syncDataGridAttributes();
  requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
}

function updateDataGridCellHeight() {
  if (!dataGrid) return;
  const grid = dataGrid.el || $("chartGrid") || $("studentChartGrid");
  if (!grid) return;
  const columnWidth = grid.clientWidth / 4;
  dataGrid.cellHeight(Math.max(220, Math.round(columnWidth)));
}

function syncDataGridAttributes() {
  if (!dataGrid) return;
  dataGrid.getGridItems().forEach(item => {
    const node = item.gridstackNode;
    if (!node) return;
    item.setAttribute("gs-x", node.x);
    item.setAttribute("gs-y", node.y);
    item.setAttribute("gs-w", node.w);
    item.setAttribute("gs-h", node.h);
  });
}

function defaultDataGridLayout(view, viewCount = 2) {
  return ({
    raw: { x: 0, y: 0, w: 2, h: 2 },
    standardized: { x: 2, y: 0, w: 2, h: 2 },
    single_corr: { x: 0, y: 2, w: 2, h: 2 },
    all_corr: { x: 2, y: 2, w: 2, h: 2 }
  })[view] || { x: 0, y: 0, w: 2, h: 2 };
}

function dataGridMinWidth(view) {
  return 1;
}

function normalizeDataGridLayout(view, layout) {
  const minW = dataGridMinWidth(view);
  const next = { ...defaultDataGridLayout(view), ...layout };
  next.w = Math.max(minW, Math.min(4, Number(next.w) || minW));
  next.h = Math.max(1, Number(next.h) || 1);
  next.x = Math.max(0, Math.min(4 - next.w, Number(next.x) || 0));
  next.y = Math.max(0, Number(next.y) || 0);
  return next;
}

function dataGridItemHtml(view, layout) {
  const minW = dataGridMinWidth(view);
  return `<div class="grid-stack-item" data-view="${view}" gs-x="${layout.x}" gs-y="${layout.y}" gs-w="${layout.w}" gs-h="${layout.h}" gs-min-w="${minW}" gs-min-h="1"><div class="grid-stack-item-content">${chartCardHtml(view, chartTitle(view), chartSub(view, dataCache), dataCardSize(view))}</div></div>`;
}

function studentPreviewTable(rows) {
  if (!rows.length) return `<div class="empty-state">暂无预览数据。</div>`;
  const columns = Object.keys(rows[0]);
  return `<div class="table-wrap"><table><thead><tr>${columns.map(col => `<th>${col}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${columns.map(col => `<td>${row[col] ?? ""}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
}

function standardizeTableHtml(rows = []) {
  if (!rows.length) return `<div class="empty-state">还没有标准化结果。</div>`;
  return `<div class="table-wrap"><table><thead><tr><th>特征</th><th>标准化列</th><th>均值</th><th>标准差</th><th>原始最小</th><th>原始最大</th><th>标准化最小</th><th>标准化最大</th></tr></thead><tbody>${rows.map(row => `<tr><td>${row.feature}</td><td>${row.standardized_feature}</td><td>${num(row.mean, 4)}</td><td>${num(row.std, 4)}</td><td>${num(row.min_before, 4)}</td><td>${num(row.max_before, 4)}</td><td>${row.min_after == null ? "--" : num(row.min_after, 4)}</td><td>${row.max_after == null ? "--" : num(row.max_after, 4)}</td></tr>`).join("")}</tbody></table></div>`;
}

function studentSelectedFeatures() {
  return [...document.querySelectorAll('input[name="studentFeatures"]:checked')].map(el => el.value);
}

function updateStudentFeatureSelect() {
  const select = $("studentFeature");
  if (!select) return;
  const selected = studentSelectedFeatures();
  select.innerHTML = selected.map(col => `<option value="${col}">${col}</option>`).join("");
}

function studentPayload(extra = {}) {
  const features = studentSelectedFeatures();
  return {
    dataset_id: studentMeta?.dataset_id,
    target: $("studentTarget")?.value,
    features,
    feature: $("studentFeature")?.value || features[0],
    use_standardized: $("studentStd")?.value !== "0",
    ...extra
  };
}

async function uploadStudentDataset() {
  const file = $("studentFile").files?.[0];
  if (!file) {
    renderStudentWorkspace("请先选择一个 CSV 文件。");
    return;
  }
  const btn = $("studentUploadBtn");
  const status = $("studentStatus");
  const message = $("studentUploadMessage");
  if (btn) {
    btn.disabled = true;
    btn.textContent = "加载中...";
  }
  if (status) status.textContent = "加载中";
  if (message) {
    message.classList.remove("hidden", "error");
    message.textContent = "正在读取 CSV，请稍等。";
  }
  const formData = new FormData();
  formData.append("file", file);
  formData.append("source_type", $("studentSourceType").value);
  try {
    const resp = await fetch("/api/student/upload", { method: "POST", body: formData });
    const text = await resp.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      throw new Error(`上传接口没有返回 JSON，状态码 ${resp.status}。请重启 Flask 服务后再试。`);
    }
    if (!resp.ok) throw new Error(data.error || `上传失败，状态码 ${resp.status}`);
    studentMeta = data;
    studentData = null;
    studentPredictData = null;
    trainData = null;
    predictData = null;
    studentStage = "数据集";
    studentTrainDirty = false;
    renderStudentPanel();
    renderStudentWorkspace("数据集已加载，请选择目标列和特征列。");
  } catch (err) {
    if (status) status.textContent = "加载失败";
    if (message) {
      message.classList.remove("hidden");
      message.classList.add("error");
      message.textContent = err.message || "上传失败。";
    }
    renderStudentWorkspace(err.message || "上传失败。");
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = "加载数据集";
    }
  }
}

  renderStudentGrid(views.length ? views : ["raw", "standardized", "corr"], view => {
    if (view === "raw") return chartCardHtml("student_raw", "原始散点图", "点击“看数据”后显示当前特征与目标列的原始关系");
    if (view === "standardized") return chartCardHtml("student_standardized", "预处理散点图", "点击“预处理”或“看数据”后显示标准化特征关系");
    if (view === "corr") return chartCardHtml("student_corr", "相关系数", "点击“看数据”后显示已选特征与目标列的相关性");
    return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">标准化表</div><div class="chart-sub">点击“预处理”后生成</div></div></div><div style="padding:18px"><div class="empty-state">等待预处理结果。</div></div></section>`;

async function preprocessStudentDataset() {
  try {
    studentStage = "数据预处理";
    const data = await postJson("/api/student/preprocess", studentPayload());
    studentMeta.preview = data.preview;
    studentMeta.row_count = data.row_count;
    studentData = { standardize_table: data.standardize_table };
    renderStudentWorkspace("预处理完成，已生成标准化特征列。");
    renderStudentStandardizeTable(data.standardize_table);
  } catch (err) {
    renderStudentWorkspace(err.message);
  }
}

function renderStudentStandardizeTable(rows) {
  const grid = $("studentChartGrid");
  if (!grid) return;
  renderStudentGrid(["table"], view => studentDataViewHtml(view, { standardize_table: rows }));
}

  try {
    studentStage = "数据预处理";
    studentData = await postJson("/api/student/data_view", studentPayload());

    if (view === "raw") ch.setOption(scatterOption(studentData.raw.scatter, studentData.raw.trend_line, studentData.feature, "原始散点图", studentData.target), true);

    if (view === "corr") ch.setOption(allCorrOption(studentData.correlations, studentData.feature), true);
  });
}

function studentDataViewHtml(view, data) {
  if (view === "raw") return chartCardHtml("student_raw", "原始散点图", `${data.feature} 与 ${data.target} 的关系`);
  if (view === "standardized") return chartCardHtml("student_standardized", "预处理散点图", `${data.standardized?.feature_name || ""} 与 ${data.target || ""} 的关系`);
  if (view === "corr") return chartCardHtml("student_corr", "相关系数", `已选特征与 ${data.target || "目标列"} 的 Pearson 相关系数`);
  return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">标准化表</div><div class="chart-sub">当前特征集合的标准化摘要</div></div></div><div style="padding:18px">${standardizeTableHtml(data.standardize_table || [])}</div></section>`;
}

async function prepareStudentTraining() {
  try {
    studentStage = "模型训练与评估";
    trainData = await postJson("/api/student/train_prepare", studentPayload({
      learning_rate: Number($("studentLr").value),
      epochs: Number($("studentEpochs").value),
      w0: Number($("studentW0").value),
      b0: Number($("studentB0").value)
    }));
    currentFrame = 0;
    studentTrainDirty = false;
    predictData = null;
    renderStudentTrainFrame(0);
  } catch (err) {
    renderStudentWorkspace(err.message);
  }
}

function renderStudentTrainFrame(index) {
  if (!trainData) return;
  currentFrame = Math.max(0, Math.min(index, trainData.history.length - 1));
  const frame = trainData.history[currentFrame];
  studentStage = "模型训练与评估";
  refreshStudentStageStrip();
  if ($("studentEpochNow")) $("studentEpochNow").textContent = frame.epoch;
  if ($("studentLossNow")) $("studentLossNow").textContent = Number(frame.loss).toFixed(4);
  const views = selectedValues("studentTrainViews");
  const displayViews = expandStudentTrainViews(views);
  if ($("studentTrainModeSummary")) $("studentTrainModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择训练图表";
  renderStudentGrid(displayViews, view => studentTrainViewHtml(view, frame));
  displayViews.forEach(view => {
    if (view === "calc" || view === "table") return;
    const ch = initChart(`chart_student_${view}`);
    if (view === "model_train") ch.setOption(trainScatterOption(currentFrame), true);
    if (view === "learning") ch.setOption(lossOption(currentFrame), true);
    if (view === "param_path") ch.setOption(studentParamPathOption(currentFrame), true);
    if (view === "rmse_gauge") ch.setOption(studentSingleGaugeOption("RMSE", frame.rmse, Math.max(...trainData.history.map(r => r.rmse), 1), "#5b35f5"), true);
    if (view === "mae_gauge") ch.setOption(studentSingleGaugeOption("MAE", frame.mae, Math.max(...trainData.history.map(r => r.mae), 1), "#c47a11"), true);
    if (view === "r2_gauge") ch.setOption(studentSingleGaugeOption("R²", Math.max(0, Math.min(1, frame.r2)), 1, "#0f9f78"), true);
  });
}

function expandStudentTrainViews(views) {
  return views.flatMap(view => view === "metrics" ? ["rmse_gauge", "mae_gauge", "r2_gauge"] : [view]);
}

function studentTrainViewHtml(view, frame) {
  if (view === "calc") return infoCardHtml("student_calc", "本轮计算过程", calcHtml(frame));
  if (view === "table") return infoCardHtml("student_table", "每轮参数表", tableHtml(currentFrame));
  if (view === "param_path") return chartCardHtml("student_param_path", "参数轨迹图", "w、b 随 epoch 的变化");
  if (view === "rmse_gauge") return chartCardHtml("student_rmse_gauge", "RMSE", "均方根误差，越小越好", "small");
  if (view === "mae_gauge") return chartCardHtml("student_mae_gauge", "MAE", "平均绝对误差，越小越好", "small");
  if (view === "r2_gauge") return chartCardHtml("student_r2_gauge", "R²", "模型解释能力，越接近 1 越好", "small");
  if (view === "learning") return chartCardHtml("student_learning", "学习准则图", "MSE Loss 随 epoch 的变化");
  return chartCardHtml("student_model_train", "模型训练图", "样本点、当前回归线和最优参考线");
}

function studentParamPathOption(frameIndex) {
  const rows = trainData.history.slice(0, frameIndex + 1);
  return {
    tooltip: { trigger: "axis" },
    legend: { top: 12 },
    grid: { left: 58, right: 24, top: 56, bottom: 42 },
    xAxis: { type: "value", name: "epoch" },
    yAxis: { type: "value", name: "参数值" },
    dataZoom: [{ type: "inside", xAxisIndex: 0, filterMode: "none" }],
    series: [
      { name: "w", type: "line", smooth: true, data: rows.map(r => [r.epoch, r.w]), lineStyle: { color: "#0f9f78", width: 3 } },
      { name: "b", type: "line", smooth: true, data: rows.map(r => [r.epoch, r.b]), lineStyle: { color: "#c47a11", width: 3 } }
    ]
  };
}

function studentSingleGaugeOption(name, value, max, color) {
  return {
    tooltip: { formatter: p => `${p.seriesName}<br>${Number(p.value).toFixed(4)}` },
    series: [
      studentGaugeSeries(name, value, 0, max, ["50%", "52%"], color)
    ]
  };
}

function studentGaugeSeries(name, value, min, max, center, color) {
  return {
    name,
    type: "gauge",
    min,
    max,
    center,
    radius: "82%",
    startAngle: 205,
    endAngle: -25,
    progress: { show: true, width: 14, itemStyle: { color } },
    axisLine: { lineStyle: { width: 14, color: [[1, "#eef2f7"]] } },
    axisTick: { show: false },
    splitLine: { length: 7, lineStyle: { color: "#cbd5e1", width: 1 } },
    axisLabel: { distance: 16, fontSize: 10, color: "#6b7280" },
    pointer: { width: 4, length: "52%", itemStyle: { color } },
    anchor: { show: true, size: 6, itemStyle: { color } },
    title: { offsetCenter: [0, "58%"], fontSize: 14, fontWeight: 900, color: "#111827" },
    detail: { valueAnimation: true, formatter: v => Number(v).toFixed(name === "R²" ? 3 : 2), offsetCenter: [0, "80%"], fontSize: 18, fontWeight: 900, color: "#111827" },

  };
}

function startStudentAuto() {
  if (!trainData) return;
  if (studentTrainDirty) return showStudentMessage("训练参数已修改，请先重新点击“准备训练”。", true);
  stopAuto();
  timer = setInterval(() => {
    if (currentFrame >= trainData.history.length - 1) {
      stopAuto();
      return;
    }
    renderStudentTrainFrame(currentFrame + 1);
  }, Number($("studentSpeed")?.value || 90));
}

function prepareStudentPredictionView() {
  studentStage = "模型预测";
  refreshStudentStageStrip();
  const views = selectedValues("studentPredictViews");
  renderStudentGrid(views.length ? views : ["result", "chart"], view => {
    if (view === "chart") return chartCardHtml("student_predict_chart", "预测可视化", "点击“开始预测”后显示预测点和回归线", "wide");

    if (view === "nearby") return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">相近样本对比</div><div class="chart-sub">等待预测输入</div></div></div><div style="padding:18px"><div class="empty-state">点击“开始预测”后显示相近样本。</div></div></section>`;

async function loadStudentPrediction() {
  try {
    studentStage = "模型预测";
    predictData = await postJson("/api/student/predict", studentPayload({
      value: Number($("studentPredictInput").value || 0)
    }));
    if (trainData && !studentTrainDirty && trainData.feature === predictData.feature && trainData.use_standardized === predictData.use_standardized) {
      const frame = trainData.history[currentFrame] || trainData.history[trainData.history.length - 1];
      predictData.w = frame.w;
      predictData.b = frame.b;
      predictData.prediction = frame.w * predictData.model_x + frame.b;
      predictData.line.y = predictData.line.x.map(x => frame.w * x + frame.b);
    }
    refreshStudentStageStrip();
    renderStudentPredictDashboard();
  } catch (err) {
    renderStudentWorkspace(err.message);
  }
}

function renderStudentPredictDashboard() {
  const views = selectedValues("studentPredictViews");
  if ($("studentPredictModeSummary")) $("studentPredictModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择预测图表";
  renderStudentGrid(views, studentPredictViewHtml);
  views.forEach(view => {
    if (view !== "chart") return;
    initChart("chart_student_predict_chart").setOption(predictChartOption(), true);
  });
}

function studentPredictViewHtml(view) {

  if (view === "calc") return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">预测计算过程</div><div class="chart-sub">标准化转换和线性模型代入</div></div></div><div style="padding:18px">${predictCalcHtml()}</div></section>`;
  if (view === "nearby") return `<section class="chart-card wide"><div class="chart-head"><div><div class="chart-title">相近样本对比</div><div class="chart-sub">与输入值最接近的 5 条样本</div></div></div><div style="padding:18px">${predictNearbyHtml()}</div></section>`;

}

function renderStudentGrid(views, htmlForView) {
  destroyDataGrid();
  disposeCharts();
  const grid = $("studentChartGrid");
  if (!grid) return;
  if (!views.length) {
    grid.classList.remove("dashboard-grid", "grid-stack");
    grid.innerHTML = `<div class="empty-state">请选择至少一个显示图表。</div>`;
    return;
  }
  if (!window.GridStack) {
    grid.classList.remove("dashboard-grid", "grid-stack");
    grid.innerHTML = views.map(htmlForView).join("");
    return;
  }
  dataGridMode = "student";
  grid.classList.add("dashboard-grid", "grid-stack");
  grid.classList.remove("single");
  const saved = loadStudentGridLayout();
  grid.innerHTML = views.map(view => {
    const layout = normalizeStudentGridLayout(view, saved[view] || defaultStudentGridLayout(view));
    return `<div class="grid-stack-item" data-view="${view}" gs-x="${layout.x}" gs-y="${layout.y}" gs-w="${layout.w}" gs-h="${layout.h}" gs-min-w="1" gs-min-h="1"><div class="grid-stack-item-content">${htmlForView(view)}</div></div>`;
  }).join("");

    column: 4,

  }, grid);

    syncDataGridAttributes();
    saveDataGridLayout();
    requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
  });
  syncDataGridAttributes();
  requestAnimationFrame(() => charts.forEach(ch => ch.resize()));
}

function defaultStudentGridLayout(view) {
  return ({
    raw: { x: 0, y: 0, w: 2, h: 2 },
    standardized: { x: 2, y: 0, w: 2, h: 2 },
    corr: { x: 0, y: 2, w: 2, h: 2 },
    table: { x: 2, y: 2, w: 2, h: 2 },
    model_train: { x: 0, y: 0, w: 2, h: 2 },
    learning: { x: 2, y: 0, w: 2, h: 2 },
    param_path: { x: 0, y: 2, w: 2, h: 2 },
    rmse_gauge: { x: 2, y: 2, w: 1, h: 1 },
    mae_gauge: { x: 3, y: 2, w: 1, h: 1 },
    r2_gauge: { x: 2, y: 3, w: 1, h: 1 },
    calc: { x: 0, y: 4, w: 4, h: 3 },
    result: { x: 0, y: 0, w: 1, h: 1 },
    chart: { x: 1, y: 0, w: 3, h: 2 },
    nearby: { x: 0, y: 2, w: 2, h: 2 }
  })[view] || { x: 0, y: 0, w: 2, h: 2 };
}

function normalizeStudentGridLayout(view, layout) {
  const next = { ...defaultStudentGridLayout(view), ...layout };
  next.w = Math.max(1, Math.min(4, Number(next.w) || 1));
  next.h = Math.max(1, Number(next.h) || 1);
  next.x = Math.max(0, Math.min(4 - next.w, Number(next.x) || 0));
  next.y = Math.max(0, Number(next.y) || 0);
  return next;
}

function normalizePredictGridLayout(view, layout) {

function num(value, digits = 4) {
  return Number(value).toFixed(digits);
}

function predictResultHtml() {
  const d = predictData;
  return `<div class="best-param-grid">
    <div class="best-param"><span>输入特征</span><strong>${d.feature}</strong></div>
    <div class="best-param"><span>原始输入</span><strong>${num(d.raw_value, 4)}</strong></div>
    <div class="best-param"><span>模型输入 x</span><strong>${num(d.model_x, 4)}</strong></div>
    <div class="best-param"><span>预测 ${d.target}</span><strong>${num(d.prediction, 2)}</strong></div>
  </div>
  <div class="formula-box">当前使用参数：w = ${num(d.w, 6)}, b = ${num(d.b, 6)}
目标列 ${d.target} 的预测值由当前单特征线性模型给出。</div>`;
}

function predictCalcHtml() {
  const d = predictData;
  const standardize = d.use_standardized
    ? `1. 输入标准化
x_standardized = (x - mean) / std
               = (${num(d.raw_value, 6)} - ${num(d.mean, 6)}) / ${num(d.std, 6)}
               = ${num(d.model_x, 6)}

`
    : `1. 使用原始特征
x = ${num(d.model_x, 6)}

`;
  return `<div class="formula-box">${standardize}2. 代入线性模型
y_hat = w * x + b
      = ${num(d.w, 6)} * ${num(d.model_x, 6)} + ${num(d.b, 6)}
      = ${num(d.prediction, 6)}

3. 预测结果
预测 ${d.target} = ${num(d.prediction, 2)}</div>`;
}

function predictNearbyHtml() {
  const rows = predictData.nearby || [];
  return `<div class="table-wrap"><table><thead><tr><th>#</th><th>${predictData.feature}</th><th>${predictData.target}</th><th>距离</th></tr></thead><tbody>${rows.map((r, i) => `<tr><td>${i + 1}</td><td>${num(r.raw_x, 3)}</td><td>${num(r.y, 2)}</td><td>${num(r.distance, 3)}</td></tr>`).join("")}</tbody></table></div>`;
}

function predictChartOption() {
  const d = predictData;
  const points = d.scatter.x.map((x, i) => [x, d.scatter.y[i]]);
  const lineData = d.line.x.map((x, i) => [x, d.line.y[i]]);
  const inputPoint = [d.model_x, d.prediction];
  const guideLine = [[d.model_x, 0], inputPoint];
  return {
    tooltip: {

function trainViewHtml(view, frame) {
  if (view === "calc") return infoCardHtml("calc", "本轮计算过程", calcHtml(frame));
  if (view === "table") return infoCardHtml("table", "每轮参数表", tableHtml(currentFrame));
  return chartCardHtml(view, chartTitle(view), chartSub(view, trainData), trainCardSize(view));
}

function defaultTrainGridLayout(view) {
  return ({
    model_train: { x: 0, y: 0, w: 2, h: 2 },
    learning: { x: 2, y: 0, w: 2, h: 2 },
    gradient: { x: 0, y: 2, w: 2, h: 2 },
    loss_surface_3d: { x: 0, y: 4, w: 2, h: 2 },
    w_path: { x: 2, y: 2, w: 1, h: 1 },
    b_path: { x: 2, y: 3, w: 1, h: 1 },
    rmse: { x: 3, y: 2, w: 1, h: 2 },
    mae: { x: 2, y: 4, w: 1, h: 2 },
    r2: { x: 3, y: 4, w: 1, h: 2 },
    gradient_descent: { x: 0, y: 6, w: 1, h: 2 },
    calc: { x: 0, y: 8, w: 4, h: 6 },
    table: { x: 0, y: 14, w: 4, h: 1 }
  })[view] || { x: 0, y: 0, w: 1, h: 1 };
}

function normalizeTrainGridLayout(view, layout) {
  const next = { ...defaultTrainGridLayout(view), ...layout };
  next.w = Math.max(1, Math.min(4, Number(next.w) || 1));
  next.h = Math.max(1, Number(next.h) || 1);
  next.x = Math.max(0, Math.min(4 - next.w, Number(next.x) || 0));
  next.y = Math.max(0, Number(next.y) || 0);
  return next;
}

function trainGridItemHtml(view, layout, frame) {
  return `<div class="grid-stack-item" data-view="${view}" gs-x="${layout.x}" gs-y="${layout.y}" gs-w="${layout.w}" gs-h="${layout.h}" gs-min-w="1" gs-min-h="1"><div class="grid-stack-item-content">${trainViewHtml(view, frame)}</div></div>`;
}

function updateTrainInfoCards(frame) {
  const calcItem = document.querySelector('.grid-stack-item[data-view="calc"] .grid-stack-item-content');

}

async function prepareTraining() {
  const feature = $("trainFeature").value;
  $("topFeature").textContent = `当前特征 ${feature}`;
  try {
    trainData = await postJson("/api/train_prepare", {
      feature,
      use_standardized: $("trainStd").value === "1",
      learning_rate: Number($("lr").value),
      epochs: Number($("epochs").value),
      w0: Number($("w0").value),
      b0: Number($("b0").value)
    });
    $("sampleCount").textContent = trainData.scatter.x.length;
  $("featureCount").textContent = FEATURE_NAMES.length;
  currentFrame = 0;
  renderTrainFrame(0);
  } catch (err) {
    renderError(err.message);
  }
}

function renderTrainFrame(index) {
  if (!trainData) return;
  currentFrame = Math.max(0, Math.min(index, trainData.history.length - 1));
  const frame = trainData.history[currentFrame];
  $("epochNow").textContent = frame.epoch;
  $("lossNow").textContent = Number(frame.loss).toFixed(4);

  const views = selectedValues("trainViews");
  const viewsKey = views.join("|");
  saveCheckedValues("trainViews", "trainSelectedViewsV1");
  const grid = $("chartGrid");
  $("trainModeSummary").textContent = views.length ? `已选择 ${views.length} 项` : "请选择显示模式";
  grid.classList.toggle("single", views.length === 1);

  const canReuseTrainGrid = dataGridMode === "train" && dataGrid && trainRenderViewsKey === viewsKey;
  if (!views.length) {
    destroyDataGrid();
    disposeCharts();
    grid.classList.remove("dashboard-grid", "grid-stack");
    grid.innerHTML = `<div class="empty-state">请选择至少一个显示模式。</div>`;
    return;
  }

  if (canReuseTrainGrid) {
    updateTrainInfoCards(frame);
  } else {
    destroyDataGrid();
    disposeCharts();
    grid.classList.remove("dashboard-grid", "grid-stack");
    if (window.GridStack) {
      renderTrainDashboard(grid, views, frame);
    } else {
      grid.innerHTML = views.map(view => trainViewHtml(view, frame)).join("");
    }
    trainRenderViewsKey = viewsKey;
  }
  /*
    if (view === "calc") return infoCardHtml("calc", "本轮计算过程", calcHtml(frame));
    if (view === "table") return infoCardHtml("table", "每轮参数表", tableHtml(currentFrame));
    return chartCardHtml(view, chartTitle(view), chartSub(view, trainData), trainCardSize(view));
  }).join("");
  */
  views.forEach(view => {
    if (view === "calc" || view === "table") return;
    const chartId = `chart_${view}`;
    const ch = charts.get(chartId) || initChart(chartId);
    if (view === "model_train") ch.setOption(trainScatterOption(currentFrame), true);
    if (view === "learning") ch.setOption(lossOption(currentFrame), true);
    if (view === "gradient") ch.setOption(contourOption(currentFrame), true);
    if (view === "loss_surface_3d") ch.setOption(lossSurface3DOption(currentFrame), false);
    if (view === "gradient_descent") ch.setOption(gradientDescentOption(currentFrame), true);
    if (view === "w_path") ch.setOption(paramPathOption("w", currentFrame), true);
    if (view === "b_path") ch.setOption(paramPathOption("b", currentFrame), true);
    if (view === "rmse") ch.setOption(metricOption("rmse", currentFrame), true);
    if (view === "mae") ch.setOption(metricOption("mae", currentFrame), true);
    if (view === "r2") ch.setOption(metricOption("r2", currentFrame), true);
  });
}

function chartCardHtml(key, title, sub, size = "") {
  return `<section class="chart-card ${size}"><div class="chart-head"><div><div class="chart-title">${title}</div><div class="chart-sub">${sub}</div></div></div><div class="chart" id="chart_${key}"></div></section>`;

}

function dataCardSize(view) {
  return view === "all_corr" ? "wide" : "";
}

function trainCardSize(view) {
  if (["gradient", "loss_surface_3d", "model_train"].includes(view)) return "wide";
  if (["w_path", "b_path", "rmse", "mae", "r2", "gradient_descent"].includes(view)) return "small";
  return "";
}

function chartTitle(view) {
  if (view === "loss_surface_3d") return "Loss 三维曲面图";
  if (view === "gradient_descent") return "梯度下降图";
  if (view === "gradient") return "Loss 等高线图";
  if (view === "r2") return "R²";
  return ({
    raw: "原始散点图",
    standardized: "预处理散点图",
    single_corr: "单特征线性相关系数",
    all_corr: "全特征线性相关系数",
    model_train: "模型训练",
    learning: "学习准则",
    gradient: "梯度下降图",
    w_path: "w 参数轨迹",
    b_path: "b 参数轨迹",
    rmse: "RMSE",
    mae: "MAE",
    r2: "R 平方"
  })[view] || view;
}

function chartSub(view, data) {
  if (view === "loss_surface_3d") return "J(w,b) 曲面、下降轨迹与偏导切线";
  if (view === "gradient_descent") return "dw、db 随训练轮数的变化";
  if (view === "gradient") return "w-b 参数空间中的 MSE 损失等高线";
  if (view === "raw") return `${data.feature} 与 MEDV 的原始关系`;
  if (view === "standardized") return `${data.standardized?.feature_name || data.x_column} 与 MEDV 的关系`;
  if (view === "single_corr") return "当前特征与 MEDV 的 Pearson 相关系数";
  if (view === "all_corr") return "所有特征与 MEDV 的 Pearson 相关系数";
  if (view === "model_train") return "样本点、当前回归线和最优参考线";
  if (view === "learning") return "MSE Loss 随 epoch 的变化";
  if (view === "gradient") return "w-b 参数空间中的损失变化";
  if (view === "w_path") return "w 随训练轮数的变化";
  if (view === "b_path") return "b 随训练轮数的变化";
  if (["rmse", "mae", "r2"].includes(view)) return "评价指标随训练轮数的变化";
  return "";
}

async function postJson(url, payload) {
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || "请求失败");
  return data;
}

function metricGaugeConfig(key, rows) {
  const values = rows.map(r => Number(r[key])).filter(Number.isFinite);
  const maxValue = values.length ? Math.max(...values) : 1;
  const minValue = values.length ? Math.min(...values) : 0;
  if (key === "r2") {
    return {
      label: "R²",
      color: "#d9354f",
      min: -1,
      max: 1,
      yMin: Math.min(-1, Math.floor(minValue)),
      yMax: 1,
      gaugeValue: value => Math.max(-1, Math.min(1, value))
    };
  }
  const upper = Math.max(10, Math.ceil(maxValue / 10) * 10);
  return {
    label: key.toUpperCase(),
    color: key === "rmse" ? "#5b35f5" : "#0f9f78",
    min: 0,
    max: upper,
    yMin: 0,
    yMax: upper,
    gaugeValue: value => Math.max(0, Math.min(upper, value))
  };
}

function mseAtParams(w, b) {
  const xs = trainData?.scatter?.x || [];
  const ys = trainData?.scatter?.y || [];
  if (!xs.length || xs.length !== ys.length) return 0;
  let total = 0;
  for (let i = 0; i < xs.length; i++) {
    const err = w * xs[i] + b - ys[i];
    total += err * err;
  }
  return total / xs.length;
}

function tangentLine3D(frame, axis, c) {
  const wSpan = Math.max(...c.w_axis) - Math.min(...c.w_axis);
  const bSpan = Math.max(...c.b_axis) - Math.min(...c.b_axis);
  const delta = axis === "w" ? Math.max(wSpan * 0.12, 0.35) : Math.max(bSpan * 0.12, 1.2);
  const slope = axis === "w" ? frame.dw : frame.db;
  if (axis === "w") {
    return [
      [frame.w - delta, frame.b, frame.mse - slope * delta],
      [frame.w + delta, frame.b, frame.mse + slope * delta]
    ];
  }
  return [
    [frame.w, frame.b - delta, frame.mse - slope * delta],
    [frame.w, frame.b + delta, frame.mse + slope * delta]
  ];
}

function lossContourSeries(c) {
  const levels = contourLevels(c.values, 11);
  const colors = ["#c7d2fe", "#93c5fd", "#60a5fa", "#22c55e", "#84cc16", "#eab308", "#f59e0b", "#fb7185", "#f43f5e", "#be123c", "#881337"];
  return levels.map((level, index) => ({
    name: `loss_level_${index + 1}`,
    type: "lines",
    coordinateSystem: "cartesian2d",
    polyline: false,
    silent: true,
    data: contourSegments(c, level),
    lineStyle: {
      color: colors[index % colors.length],
      width: index === 0 ? 1.5 : 1.8,
      opacity: 0.9
    },
    z: 2
  })).filter(series => series.data.length);
}

function contourLevels(values, count) {
  const sorted = values.map(v => Number(v[2])).filter(Number.isFinite).sort((a, b) => a - b);
  if (!sorted.length) return [];
  const levels = [];
  for (let i = 0; i < count; i++) {
    const p = 0.06 + (0.88 * i) / Math.max(1, count - 1);
    const idx = Math.min(sorted.length - 1, Math.max(0, Math.round(p * (sorted.length - 1))));
    const level = sorted[idx];
    if (!levels.some(v => Math.abs(v - level) <= Math.max(1e-9, Math.abs(level) * 1e-8))) levels.push(level);
  }
  return levels;
}

function contourSegments(c, level) {
  const cols = c.w_axis.length;
  const rows = c.b_axis.length;
  const z = Array.from({ length: rows }, () => Array(cols).fill(NaN));
  c.values.forEach(([j, i, value]) => {
    if (i >= 0 && i < rows && j >= 0 && j < cols) z[i][j] = value;
  });

  const segments = [];
  for (let i = 0; i < rows - 1; i++) {
    for (let j = 0; j < cols - 1; j++) {
      const p00 = [c.w_axis[j], c.b_axis[i], z[i][j]];
      const p10 = [c.w_axis[j + 1], c.b_axis[i], z[i][j + 1]];
      const p11 = [c.w_axis[j + 1], c.b_axis[i + 1], z[i + 1][j + 1]];
      const p01 = [c.w_axis[j], c.b_axis[i + 1], z[i + 1][j]];
      const points = [
        contourEdgePoint(p00, p10, level),
        contourEdgePoint(p10, p11, level),
        contourEdgePoint(p11, p01, level),
        contourEdgePoint(p01, p00, level)
      ].filter(Boolean);

      if (points.length === 2) {
        segments.push({ coords: points });
      } else if (points.length === 4) {
        segments.push({ coords: [points[0], points[1]] }, { coords: [points[2], points[3]] });
      }
    }
  }
  return segments;
}

function contourEdgePoint(a, b, level) {
  const z1 = a[2];
  const z2 = b[2];
  if (!Number.isFinite(z1) || !Number.isFinite(z2) || z1 === z2) return null;
  const crosses = (level >= Math.min(z1, z2)) && (level <= Math.max(z1, z2));
  if (!crosses) return null;
  const t = (level - z1) / (z2 - z1);
  return [
    a[0] + t * (b[0] - a[0]),
    a[1] + t * (b[1] - a[1])
  ];
}

function calcHtmlDetailed(frame) {
  const lr = trainData?.learning_rate ?? Number($("lr")?.value || 0);
  const m = trainData?.scatter?.x?.length || 0;
  const rows = (frame.x_first5 || []).map((x, i) => {
    const y = frame.y_first5?.[i] ?? 0;
    const pred = frame.pred_first5?.[i] ?? 0;
    const err = frame.err_first5?.[i] ?? 0;
    return `  ${i + 1}. x=${Number(x).toFixed(4)}, y=${Number(y).toFixed(4)}, y_hat=${Number(pred).toFixed(4)}, 预测误差=${Number(err).toFixed(4)}`;
  }).join("\n");

  return `<div class="formula">epoch = ${frame.epoch}

1. 当前参数
w = ${frame.w.toFixed(6)}
b = ${frame.b.toFixed(6)}

2. 前 5 个样本的预测与误差
y_hat = w * x + b
预测误差 = y_hat - y
${rows}

3. 本轮损失与评价指标
MSE = mean(预测误差^2) = ${frame.mse.toFixed(6)}
RMSE = sqrt(MSE) = ${frame.rmse.toFixed(6)}
MAE = mean(abs(预测误差)) = ${frame.mae.toFixed(6)}
R 平方 = ${frame.r2.toFixed(6)}

4. 梯度计算
dw = (2 / m) * sum(预测误差 * x), m = ${m}
db = (2 / m) * sum(预测误差)
dw = ${frame.dw.toFixed(6)}
db = ${frame.db.toFixed(6)}

5. 参数更新
learning_rate = ${Number(lr).toFixed(6)}
new_w = w - learning_rate * dw
      = ${frame.w.toFixed(6)} - ${Number(lr).toFixed(6)} * ${frame.dw.toFixed(6)}
      = ${frame.new_w.toFixed(6)}
new_b = b - learning_rate * db
      = ${frame.b.toFixed(6)} - ${Number(lr).toFixed(6)} * ${frame.db.toFixed(6)}
      = ${frame.new_b.toFixed(6)}</div>`;
}

}

function tableHtml(frameIndex) {
  const allRows = trainData.history.slice(0, frameIndex + 1);
  const rows = allRows.slice(-50);
  const firstEpoch = rows[0]?.epoch ?? 0;
  const lastEpoch = rows[rows.length - 1]?.epoch ?? 0;

  return `${note}<div class="table-wrap"><table><thead><tr><th>Epoch</th><th>w</th><th>b</th><th>MSE</th><th>RMSE</th><th>MAE</th><th>R 平方</th><th>dw</th><th>db</th></tr></thead><tbody>${rows.map(r => `<tr><td>${r.epoch}</td><td>${r.w.toFixed(6)}</td><td>${r.b.toFixed(6)}</td><td>${r.mse.toFixed(6)}</td><td>${r.rmse.toFixed(6)}</td><td>${r.mae.toFixed(6)}</td><td>${r.r2.toFixed(6)}</td><td>${r.dw.toFixed(6)}</td><td>${r.db.toFixed(6)}</td></tr>`).join("")}</tbody></table></div>`;
}

function startAuto() {
  if (!trainData) return;
  stopAuto();
  timer = setInterval(() => {
    if (currentFrame >= trainData.history.length - 1) {
      stopAuto();
      return;
    }
    renderTrainFrame(currentFrame + 1);
  }, Number($("speed").value));
}

function stopAuto() {
  if (timer) {
    clearInterval(timer);
    timer = null;
  }
}

function renderError(message) {
  $("main").innerHTML = `<section class="content-card"><h2>加载失败</h2><p>${message}</p></section>`;
}

function renderTheoryHtmlSlot(page) {
  const src = `/static/theory-html/${page}.html`;
  return `<div class="html-lesson hidden" data-theory-html="${src}"><iframe title="理论讲义"></iframe></div>`;
}

async function loadTheoryHtml(page) {
  const wrap = document.querySelector("[data-theory-html]");
  if (!wrap) return;
  const src = wrap.dataset.theoryHtml;
  try {
    const resp = await fetch(src, { cache: "no-store" });
    if (!resp.ok) return;
    const html = await resp.text();
    const iframe = wrap.querySelector("iframe");
    iframe.setAttribute("scrolling", "no");
    iframe.onload = () => fitTheoryIframe(iframe);
    iframe.srcdoc = html;
    wrap.classList.remove("hidden");
  } catch (err) {
    // Converted HTML is optional; missing files should not affect the lesson page.
  }
}

function fitTheoryIframe(iframe) {
  const resize = () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || !doc.body) return;
      doc.documentElement.style.overflow = "hidden";
      doc.body.style.overflow = "hidden";
      const height = Math.max(
        doc.body.scrollHeight,
        doc.documentElement.scrollHeight,
        doc.body.offsetHeight,
        doc.documentElement.offsetHeight
      );
      iframe.style.height = `${height + 20}px`;
    } catch (err) {
      iframe.style.height = "680px";
    }
  };
  resize();
  setTimeout(resize, 100);
  setTimeout(resize, 500);
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (doc && "ResizeObserver" in window) {
      const observer = new ResizeObserver(resize);
      observer.observe(doc.body);
    }
  } catch (err) {}
}

document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => setPage(btn.dataset.page)));

if (jumpExperiment) jumpExperiment.addEventListener("click", () => setPage("preprocess"));

  updateDataGridCellHeight();
  charts.forEach(ch => ch.resize());
});
setPage("basic");
